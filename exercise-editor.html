<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrossFit Exercise Editor — l.AlShamali</title>
<style>
:root{
  --bg:#0f1117; --bg2:#1a1d27; --bg3:#22263a;
  --border:#2e3348; --border2:#3e4565;
  --text:#e8eaf2; --text2:#8b90ab; --text3:#555e7a;
  --accent:#378ADD;
  --t1:#1D9E75; --t1b:#0c3d2d;
  --t2:#378ADD; --t2b:#0d2a4a;
  --t3:#BA7517; --t3b:#3d2500;
  --t4:#D4537E; --t4b:#3d0f22;
  --dumb:#a070e0; --dumbb:#1e0a3d;
  --card:#72b01d; --cardb:#1a2a0a;
  --red:#e05050; --redb:#3a0e0e;
  --green:#1D9E75;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh}

/* HEADER */
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:10px}
.hdr-title{font-size:15px;font-weight:700}
.hdr-sub{font-size:10px;color:var(--text2)}
.hdr-counts{font-size:11px;color:var(--text2);text-align:left;line-height:1.6}
.hdr-counts b{color:var(--text)}

/* TOOLBAR */
.tb{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;flex-wrap:wrap;gap:7px;align-items:center;position:sticky;top:57px;z-index:49}
.srch{position:relative;flex:1;min-width:140px}
.srch input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 10px 7px 32px;color:var(--text);font-size:12px;outline:none}
.srch input:focus{border-color:var(--accent)}
.srch::before{content:'🔍';position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px}
.filters{display:flex;flex-wrap:wrap;gap:5px}
.fb{padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:11px;cursor:pointer;transition:.12s}
.fb:hover{border-color:var(--accent);color:var(--accent)}
.fb.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.fb.on-t1{background:var(--t1b);border-color:var(--t1);color:var(--t1)}
.fb.on-t2{background:var(--t2b);border-color:var(--t2);color:var(--t2)}
.fb.on-t3{background:var(--t3b);border-color:var(--t3);color:var(--t3)}
.fb.on-t4{background:var(--t4b);border-color:var(--t4);color:var(--t4)}
.fb.on-barbell{background:var(--t2b);border-color:var(--t2);color:var(--t2)}
.fb.on-gymnastics{background:var(--t1b);border-color:var(--t1);color:var(--t1)}
.fb.on-kettlebell{background:var(--t3b);border-color:var(--t3);color:var(--t3)}
.fb.on-dumbbell{background:var(--dumbb);border-color:var(--dumb);color:var(--dumb)}
.fb.on-cardio{background:var(--cardb);border-color:var(--card);color:var(--card)}
.fb.on-del{background:var(--redb);border-color:var(--red);color:var(--red)}
.add-btn{margin-right:auto;padding:6px 13px;border-radius:8px;background:var(--green);border:none;color:#fff;font-size:12px;font-weight:600;cursor:pointer}
.add-btn:hover{filter:brightness(1.1)}

/* TIER HEADER */
.tier-hd{display:flex;align-items:center;gap:8px;padding:8px 16px 4px;margin-top:8px}
.tier-pip{width:8px;height:8px;border-radius:50%}
.tier-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px}
.tier-n{font-size:10px;color:var(--text3)}
.t1-hd .tier-pip{background:var(--t1)} .t1-hd .tier-name{color:var(--t1)}
.t2-hd .tier-pip{background:var(--t2)} .t2-hd .tier-name{color:var(--t2)}
.t3-hd .tier-pip{background:var(--t3)} .t3-hd .tier-name{color:var(--t3)}
.t4-hd .tier-pip{background:var(--t4)} .t4-hd .tier-name{color:var(--t4)}

/* EXERCISE CARD */
.cards{padding:0 16px 4px;display:flex;flex-direction:column;gap:5px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .12s}
.card.sel{border-color:var(--accent)}
.card.del{border-color:var(--redb);background:var(--redb);opacity:.6}
.card.added{border-color:var(--dumb)}
.card.edited{border-color:var(--t2)}

/* CARD TOP ROW */
.ct{display:flex;align-items:center;gap:7px;padding:9px 12px;cursor:pointer;user-select:none}
.ct:hover{background:rgba(255,255,255,.02)}
.ex-name{font-size:13px;font-weight:600;flex:1;min-width:0}
.card.del .ex-name{text-decoration:line-through;color:var(--text3)}
.bdg{font-size:9px;padding:1px 6px;border-radius:10px;font-weight:600;text-transform:uppercase;flex-shrink:0}
.bdg-cat-barbell{background:var(--t2b);color:var(--t2)}
.bdg-cat-gymnastics{background:var(--t1b);color:var(--t1)}
.bdg-cat-kettlebell{background:var(--t3b);color:var(--t3)}
.bdg-cat-dumbbell{background:var(--dumbb);color:var(--dumb)}
.bdg-cat-cardio{background:var(--cardb);color:var(--card)}
.bdg-unit{background:var(--bg3);border:1px solid var(--border);color:var(--text2)}
.bdg-edited{background:var(--t2b);color:var(--t2)}
.bdg-added{background:var(--dumbb);color:var(--dumb)}
.bdg-del{background:var(--redb);color:var(--red)}

/* ALTS ROW */
.alts{display:flex;flex-wrap:wrap;gap:4px;padding:0 12px 9px}
.alt{font-size:11px;padding:2px 4px 2px 9px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;color:var(--text2);display:inline-flex;align-items:center;gap:4px}
.alt.auto{border-color:var(--green);color:var(--green)}
.alt-x{background:none;border:none;color:var(--text3);font-size:11px;cursor:pointer;line-height:1;padding:0 3px 0 0;border-radius:0 20px 20px 0;transition:.1s}
.alt-x:hover{color:var(--red)}

/* DELETE BUTTON on card */
.del-btn{padding:4px 9px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:11px;cursor:pointer;flex-shrink:0;transition:.12s}
.del-btn:hover{background:var(--redb);border-color:var(--red);color:var(--red)}
.undel-btn{padding:4px 9px;border-radius:6px;border:1px solid var(--t1);background:var(--t1b);color:var(--t1);font-size:11px;cursor:pointer;flex-shrink:0}

/* EDIT PANEL */
.ep{display:none;border-top:1px solid var(--border);background:var(--bg);padding:12px}
.ep.open{display:block}
.ep-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:8px;margin-bottom:8px}
@media(max-width:540px){.ep-grid{grid-template-columns:1fr 1fr}}
.field label{display:block;font-size:10px;color:var(--text2);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field select{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:6px 8px;color:var(--text);font-size:12px;outline:none}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field.span2{grid-column:span 2}
.field.full{grid-column:1/-1}
.ep-row{display:flex;gap:7px}
.ep-save{padding:6px 14px;border-radius:7px;background:var(--accent);border:none;color:#fff;font-size:12px;font-weight:600;cursor:pointer}
.ep-cancel{padding:6px 12px;border-radius:7px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:12px;cursor:pointer}

/* ADD FORM */
.add-form{display:none;margin:8px 16px;background:var(--bg2);border:1px solid var(--dumb);border-radius:10px;padding:14px}
.add-form.open{display:block}
.add-form h3{font-size:12px;font-weight:700;color:var(--dumb);margin-bottom:10px}

/* BOTTOM BAR */
.bot{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);padding:9px 16px;z-index:100}
.bot-inner{max-width:800px;margin:0 auto;display:flex;gap:8px;align-items:center}
.bot-st{flex:1;font-size:11px;color:var(--text2)}
.bot-st b{color:var(--text)}
.reset-btn{padding:7px 12px;border-radius:7px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:11px;cursor:pointer}
.exp-btn{padding:8px 16px;border-radius:8px;background:var(--green);border:none;color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.exp-btn:disabled{background:var(--bg3);color:var(--text3);cursor:not-allowed}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;width:100%;max-width:620px;max-height:85vh;display:flex;flex-direction:column}
.mhd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.mhd h2{font-size:14px;font-weight:700}
.mcls{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;line-height:1}
.mbody{padding:14px 18px;overflow-y:auto;flex:1}
.mbody p{font-size:11px;color:var(--text2);margin-bottom:8px}
.code-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;font-family:monospace;font-size:10px;color:#80d080;white-space:pre-wrap;overflow-x:auto;max-height:280px;overflow-y:auto;line-height:1.5}
.note{background:var(--bg3);border-radius:8px;padding:9px 11px;margin-top:8px;font-size:11px;color:var(--text2)}
.note b{color:var(--text)}
.mft{padding:10px 18px;border-top:1px solid var(--border);display:flex;gap:7px;justify-content:flex-end}
.copy-btn{padding:7px 14px;border-radius:7px;background:var(--accent);border:none;color:#fff;font-size:12px;cursor:pointer;font-weight:600}

.empty{text-align:center;color:var(--text2);padding:40px 20px;font-size:13px}
.sep{width:1px;height:14px;background:var(--border);flex-shrink:0}
.pb{padding-bottom:60px}
.ac-item{padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:12px;border-bottom:1px solid var(--border2)}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.ac-sel{background:var(--bg3)}
.ac-name{flex:1;color:var(--text);font-weight:500}
.ac-name em{color:var(--accent);font-style:normal;font-weight:700}
.ac-meta{font-size:10px;color:var(--text3);display:flex;gap:5px}
.ac-exists{font-size:10px;color:var(--red);margin-right:4px}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-title">⚡ Exercise Editor</div>
    <div class="hdr-sub">l.AlShamali · WOD Generator</div>
  </div>
  <div class="hdr-counts" id="hcnt"></div>
</div>

<div class="tb">
  <div class="srch"><input type="text" id="q" placeholder="بحث..." oninput="render()"></div>
  <div class="filters">
    <button class="fb on" data-f="all" onclick="setF(this)">الكل</button>
    <button class="fb" data-f="t1"  onclick="setF(this)">T1</button>
    <button class="fb" data-f="t2"  onclick="setF(this)">T2</button>
    <button class="fb" data-f="t3"  onclick="setF(this)">T3</button>
    <button class="fb" data-f="t4"  onclick="setF(this)">T4</button>
    <span class="sep"></span>
    <button class="fb" data-f="barbell"    onclick="setF(this)">🏋️</button>
    <button class="fb" data-f="gymnastics" onclick="setF(this)">🤸</button>
    <button class="fb" data-f="kettlebell" onclick="setF(this)">🔔</button>
    <button class="fb" data-f="dumbbell"   onclick="setF(this)">💪</button>
    <button class="fb" data-f="cardio"     onclick="setF(this)">🏃</button>
    <span class="sep"></span>
    <button class="fb" data-f="del" onclick="setF(this)">🗑</button>
  </div>
  <button class="add-btn" onclick="openAdd()">+ جديد</button>
</div>

<div class="pb">
  <div class="add-form" id="addForm">
    <h3>➕ تمرين جديد</h3>
    <div class="ep-grid">
      <div class="field" style="position:relative">
        <label>الاسم</label>
        <input id="a-name" placeholder="Exercise Name" autocomplete="off" oninput="acInput()" onkeydown="acKey(event)" onfocus="acInput()">
        <div id="ac-drop" style="display:none;position:absolute;top:100%;left:0;right:0;z-index:200;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;margin-top:3px;max-height:200px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,.4)"></div>
      </div>
      <div class="field"><label>الفئة</label>
        <select id="a-cat">
          <option value="gymnastics">Gymnastics</option>
          <option value="barbell">Barbell</option>
          <option value="kettlebell">Kettlebell</option>
          <option value="dumbbell">Dumbbell</option>
          <option value="cardio">Cardio</option>
        </select>
      </div>
      <div class="field"><label>Tier</label>
        <select id="a-tier">
          <option value="1">1 — أساسي</option>
          <option value="2">2 — متوسط</option>
          <option value="3">3 — متقدم</option>
          <option value="4">4 — إيليت</option>
        </select>
      </div>
      <div class="field"><label>Unit</label>
        <select id="a-unit">
          <option value="">reps</option>
          <option value="carry">carry</option>
          <option value="time">time</option>
          <option value="side">side</option>
        </select>
      </div>
      <div class="field full"><label>البدائل (بفاصلة)</label>
        <input id="a-alts" placeholder="Alt 1, Alt 2, Alt 3, Alt 4">
      </div>
    </div>
    <div class="ep-row">
      <button class="ep-save" onclick="doAdd()">✓ إضافة</button>
      <button class="ep-cancel" onclick="closeAdd()">إلغاء</button>
    </div>
  </div>

  <div id="list"></div>
</div>

<div class="bot">
  <div class="bot-inner">
    <div class="bot-st" id="bst">ما في تعديلات</div>
    <button class="reset-btn" id="undoBtn" onclick="doUndo()" disabled title="ما في شيء للتراجع">↩ تراجع</button>
    <button class="reset-btn" onclick="doReset()">🗑 ريست</button>
    <button class="exp-btn" id="expBtn" onclick="openExport()" disabled>📤 تصدير للتطبيق</button>
  </div>
</div>

<div class="overlay" id="expModal">
  <div class="modal">
    <div class="mhd"><h2>📤 كود STR الجاهز</h2><button class="mcls" onclick="closeExport()">✕</button></div>
    <div class="mbody">
      <p>انسخي الكود كله وأرسليه لي وأنا أحطه مباشرة في index.html:</p>
      <div class="code-box" id="codeBox"></div>
      <div class="note"><b>الخطوة:</b> انسخي ← افتحي المحادثة ← الصقي وقولي "طبق الكود"</div>
    </div>
    <div class="mft">
      <button class="ep-cancel" onclick="closeExport()">إغلاق</button>
      <button class="copy-btn" id="cpyBtn" onclick="doCopy()">📋 نسخ</button>
    </div>
  </div>
</div>

/* ═══ STATE ═══ */
var nextId=200;
var extras=[];
var ST={};

function initState(){
  BASE.forEach(function(e){
    ST[e.id]={del:false,edited:false,added:false,name:e.name,alts:e.alts.slice(),autoAlts:[],cat:e.cat,t:e.t,unit:e.unit||''};
  });
}

function saveState(){
  try{
    localStorage.setItem('ex_editor_ST', JSON.stringify(ST));
    localStorage.setItem('ex_editor_extras', JSON.stringify(extras));
    localStorage.setItem('ex_editor_nextId', nextId);
    localStorage.setItem('ex_editor_saved', Date.now());
  }catch(e){}
}

function loadState(){
  try{
    var raw=localStorage.getItem('ex_editor_ST');
    var rawE=localStorage.getItem('ex_editor_extras');
    var rawN=localStorage.getItem('ex_editor_nextId');
    if(!raw) return false;
    ST=JSON.parse(raw);
    extras=rawE?JSON.parse(rawE):[];
    nextId=rawN?parseInt(rawN):200;
    return true;
  }catch(e){return false;}
}

function savedLabel(){
  var ts=localStorage.getItem('ex_editor_saved');
  if(!ts) return '';
  var d=new Date(parseInt(ts));
  return d.toLocaleDateString('ar',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('ar',{hour:'2-digit',minute:'2-digit'});
}

initState();
var hasSaved=loadState();
// Merge: any BASE entries added AFTER the last save won't be in ST — add them now
BASE.forEach(function(e){
  if(!ST[e.id]){
    ST[e.id]={del:false,edited:false,added:false,name:e.name,alts:e.alts.slice(),autoAlts:[],cat:e.cat,t:e.t,unit:e.unit||''};
  }
});
// Re-register any extras that were saved but not in ST
extras.forEach(function(e){
  if(!ST[e.id]) ST[e.id]={del:false,edited:false,added:true,name:e.name,alts:(e.alts||[]).slice(),autoAlts:[],cat:e.cat,t:e.t,unit:e.unit||''};
});

/* ═══ UNDO STACK ═══ */
var undoStack=[];
var UNDO_LIMIT=30;

function snapshot(){
  undoStack.push({ST:JSON.parse(JSON.stringify(ST)),extras:JSON.parse(JSON.stringify(extras)),nextId:nextId});
  if(undoStack.length>UNDO_LIMIT) undoStack.shift();
  updateUndoBtn();
}

function doUndo(){
  if(!undoStack.length) return;
  var prev=undoStack.pop();
  ST=prev.ST; extras=prev.extras; nextId=prev.nextId;
  openId=null;
  saveState();
  updateUndoBtn();
  render();
}

function updateUndoBtn(){
  var btn=document.getElementById('undoBtn');
  if(!btn) return;
  btn.disabled=!undoStack.length;
  btn.title=undoStack.length?'تراجع ('+undoStack.length+' خطوة)':'ما في شيء للتراجع';
  btn.textContent='↩ تراجع'+(undoStack.length?' ('+undoStack.length+')':'');
}

var activeF='all';

/* ═══ ALL EXERCISES (base + extras) ═══ */
function allEx(){return BASE.concat(extras);}

/* ═══ AUTO-REPLACE: when exercise X is deleted,
   scan every other exercise's alts and replace X with a suitable substitute ═══ */
function pickReplacement(s, excludeName){
  // Returns a name string or null. Priority: 1) same cat  2) same tier  3) FALLBACK_POOL
  var ex=allEx();
  function base(fn){
    return ex.filter(function(c){
      if(ST[c.id].del) return false;
      var n=ST[c.id].name;
      if(n===s.name||n===excludeName) return false;
      if(s.alts.indexOf(n)>=0) return false;
      if((s.autoAlts||[]).indexOf(n)>=0) return false;
      return fn(c);
    });
  }
  var byCat=base(function(c){return ST[c.id].cat===s.cat;});
  var byTier=byCat.length?byCat:base(function(c){return ST[c.id].t===s.t;});
  if(byTier.length){
    byTier.sort(function(){return Math.random()-.5;});
    return ST[byTier[0].id].name;
  }
  var fb=(FALLBACK_POOL[s.cat]||FALLBACK_POOL.gymnastics).filter(function(n){
    return n!==s.name&&n!==excludeName&&s.alts.indexOf(n)<0;
  });
  return fb.length?fb[Math.floor(Math.random()*fb.length)]:null;
}

function autoFillAlts(deletedName){
  allEx().forEach(function(e){
    var s=ST[e.id];
    if(s.del) return;
    var idx=s.alts.indexOf(deletedName);
    if(idx<0) return;
    s.alts.splice(idx,1);
    s.autoAlts=s.autoAlts||[];
    var rep=pickReplacement(s,deletedName);
    if(rep){
      s.alts.splice(idx,0,rep);
      s.autoAlts.push(rep);
      s.edited=true;
    }
  });
}

/* ═══ FILTERS ═══ */
function setF(btn){
  var f=btn.dataset.f;
  activeF=f;
  document.querySelectorAll('.fb').forEach(function(b){
    b.className='fb';
    if(b===btn){
      if(f==='all'||f==='del') b.classList.add('on');
      else if(f.startsWith('t')) b.classList.add('on-'+f);
      else b.classList.add('on-'+f);
    }
  });
  render();
}

/* ═══ RENDER ═══ */
function render(){
  var q=(document.getElementById('q').value||'').toLowerCase();
  var ex=allEx();
  var filtered=ex.filter(function(e){
    var s=ST[e.id];
    if(activeF==='del') return s.del;
    if(activeF==='t1') return s.t===1&&!s.del;
    if(activeF==='t2') return s.t===2&&!s.del;
    if(activeF==='t3') return s.t===3&&!s.del;
    if(activeF==='t4') return s.t===4&&!s.del;
    if(['barbell','gymnastics','kettlebell','dumbbell','cardio'].indexOf(activeF)>=0) return s.cat===activeF&&!s.del;
    // all
    if(s.del) return false;
    if(q&&s.name.toLowerCase().indexOf(q)<0) return false;
    return true;
  }).filter(function(e){
    var s=ST[e.id];
    if(q&&activeF!=='del'&&s.name.toLowerCase().indexOf(q)<0) return false;
    return true;
  });

  var byT={};
  filtered.forEach(function(e){var t=ST[e.id].t;(byT[t]=byT[t]||[]).push(e);});

  var TINFO={
    1:{cls:'t1-hd',label:'Tier 1 — أساسي'},
    2:{cls:'t2-hd',label:'Tier 2 — متوسط'},
    3:{cls:'t3-hd',label:'Tier 3 — متقدم'},
    4:{cls:'t4-hd',label:'Tier 4 — إيليت'}
  };
  var CATL={barbell:'BB',gymnastics:'GYM',kettlebell:'KB',dumbbell:'DB',cardio:'CARDIO'};
  var UNITL={carry:'📏',time:'⏱',side:'🔄'};

  var html='';
  [1,2,3,4].forEach(function(t){
    if(!byT[t]||!byT[t].length) return;
    var ti=TINFO[t];
    html+='<div class="tier-hd '+ti.cls+'"><div class="tier-pip"></div><span class="tier-name">'+ti.label+'</span><span class="tier-n">('+byT[t].length+')</span></div>';
    html+='<div class="cards">';
    byT[t].forEach(function(e){
      var s=ST[e.id];
      var isOpen=(openId===e.id);
      var cls='card';
      if(s.del) cls+=' del';
      else if(s.added) cls+=' added';
      else if(s.edited) cls+=' edited';
      if(isOpen&&!s.del) cls+=' sel';

      html+='<div class="'+cls+'" id="c-'+e.id+'">';
      // Top row
      html+='<div class="ct" onclick="clickCard('+e.id+',event)">';
      html+='<span class="ex-name">'+esc(s.name)+'</span>';
      if(s.added) html+='<span class="bdg bdg-added">جديد</span>';
      else if(s.edited) html+='<span class="bdg bdg-edited">✎</span>';
      if(s.del) html+='<span class="bdg bdg-del">محذوف</span>';
      html+='<span class="bdg bdg-cat-'+s.cat+'">'+CATL[s.cat]+'</span>';
      if(s.unit) html+='<span class="bdg bdg-unit">'+UNITL[s.unit]+'</span>';
      // Action buttons
      if(!s.del){
        html+='<button class="del-btn" onclick="doDel(event,'+e.id+')">✕</button>';
      } else {
        html+='<button class="undel-btn" onclick="doUndel(event,'+e.id+')">↩</button>';
      }
      html+='</div>';
      // Alts row (always visible)
      if(!s.del){
        html+='<div class="alts">';
        s.alts.forEach(function(a,ai){
          var isAuto=(s.autoAlts&&s.autoAlts.indexOf(a)>=0);
          html+='<span class="alt'+(isAuto?' auto':'')+'">'
            +(isAuto?'✦ ':'')+esc(a)
            +'<button class="alt-x" onclick="delAlt(event,'+e.id+','+ai+')">✕</button>'
            +'</span>';
        });
        html+='</div>';
      }
      // Edit panel
      if(isOpen&&!s.del){
        html+='<div class="ep open">';
        html+='<div class="ep-grid">';
        html+='<div class="field"><label>الاسم</label><input id="en-'+e.id+'" value="'+esc(s.name)+'"></div>';
        html+='<div class="field"><label>الفئة</label><select id="ec-'+e.id+'">';
        ['gymnastics','barbell','kettlebell','dumbbell','cardio'].forEach(function(c){
          html+='<option value="'+c+'"'+(s.cat===c?' selected':'')+'>'+CATL[c]+'</option>';
        });
        html+='</select></div>';
        html+='<div class="field"><label>Tier</label><select id="et-'+e.id+'">';
        [1,2,3,4].forEach(function(tv){
          html+='<option value="'+tv+'"'+(s.t===tv?' selected':'')+'>'+tv+'</option>';
        });
        html+='</select></div>';
        html+='<div class="field"><label>Unit</label><select id="eu-'+e.id+'">';
        [['','reps'],['carry','📏carry'],['time','⏱time'],['side','🔄side']].forEach(function(u){
          html+='<option value="'+u[0]+'"'+(s.unit===u[0]?' selected':'')+'>'+u[1]+'</option>';
        });
        html+='</select></div>';
        html+='<div class="field full"><label>البدائل (بفاصلة — 4 كحد أقصى)</label><input id="ea-'+e.id+'" value="'+esc(s.alts.join(', '))+'"></div>';
        html+='</div>';
        html+='<div class="ep-row">';
        html+='<button class="ep-save" onclick="doSave('+e.id+')">✓ حفظ</button>';
        html+='<button class="ep-cancel" onclick="openId=null;render()">إلغاء</button>';
        html+='</div></div>';
      }
      html+='</div>';
    });
    html+='</div>';
  });

  if(!html) html='<div class="empty">ما في نتائج 🙅</div>';
  document.getElementById('list').innerHTML=html;
  updateBar();
  saveState();
  updateUndoBtn();
}

/* ═══ CARD CLICK (toggle edit) ═══ */
function clickCard(id,e){
  if(e.target.tagName==='BUTTON'||e.target.tagName==='INPUT'||e.target.tagName==='SELECT') return;
  var s=ST[id];
  if(s.del) return;
  openId=(openId===id)?null:id;
  render();
  if(openId===id){
    setTimeout(function(){
      var el=document.getElementById('c-'+id);
      if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'});
    },60);
  }
}

/* ═══ DELETE ═══ */
function doDel(e,id){
  e.stopPropagation();
  snapshot();
  var delName=ST[id].name;
  ST[id].del=true;
  if(openId===id) openId=null;
  autoFillAlts(delName);
  render();
}
function doUndel(e,id){
  e.stopPropagation();
  snapshot();
  ST[id].del=false;
  render();
}

/* ═══ SAVE EDIT ═══ */
function doSave(id){
  snapshot();
  var s=ST[id];
  var n=document.getElementById('en-'+id);
  var c=document.getElementById('ec-'+id);
  var t=document.getElementById('et-'+id);
  var u=document.getElementById('eu-'+id);
  var a=document.getElementById('ea-'+id);
  if(n&&n.value.trim()) s.name=n.value.trim();
  if(c) s.cat=c.value;
  if(t) s.t=parseInt(t.value);
  if(u) s.unit=u.value;
  if(a) s.alts=a.value.split(',').map(function(x){return x.trim();}).filter(Boolean).slice(0,4);
  s.autoAlts=[];
  s.edited=true;
  openId=null;
  render();
}

/* ═══ ADD NEW ═══ */
function openAdd(){
  document.getElementById('addForm').classList.add('open');
  setTimeout(function(){document.getElementById('a-name').focus();},50);
}
function closeAdd(){document.getElementById('addForm').classList.remove('open');}
function doAdd(){
  snapshot();
  var name=document.getElementById('a-name').value.trim();
  if(!name){alert('اكتبي اسم التمرين');return;}
  var cat=document.getElementById('a-cat').value;
  var tier=parseInt(document.getElementById('a-tier').value);
  var unit=document.getElementById('a-unit').value;
  var alts=document.getElementById('a-alts').value.split(',').map(function(x){return x.trim();}).filter(Boolean).slice(0,4);
  var id=nextId++;
  var ex={id:id,t:tier,cat:cat,name:name,alts:alts};
  if(unit) ex.unit=unit;
  extras.push(ex);
  ST[id]={del:false,edited:false,added:true,name:name,alts:alts,autoAlts:[],cat:cat,t:tier,unit:unit};
  document.getElementById('a-name').value='';
  document.getElementById('a-alts').value='';
  closeAdd();
  activeF='t'+tier;
  document.querySelectorAll('.fb').forEach(function(b){
    b.className='fb';
    if(b.dataset.f==='t'+tier) b.classList.add('on-t'+tier);
  });
  render();
}

/* ═══ RESET ═══ */
function doReset(){
  if(!confirm('تعيدي ضبط كل التعديلات وتمسحين الحفظ؟')) return;
  ST={};extras=[];nextId=200;
  initState();
  try{localStorage.removeItem('ex_editor_ST');localStorage.removeItem('ex_editor_extras');localStorage.removeItem('ex_editor_nextId');localStorage.removeItem('ex_editor_saved');}catch(e){}
  openId=null;activeF='all';
  document.getElementById('q').value='';
  document.querySelectorAll('.fb').forEach(function(b,i){b.className='fb';if(i===0)b.classList.add('on');});
  render();
}

/* ═══ STATUS BAR ═══ */
function updateBar(){
  var ex=allEx();
  var dels=ex.filter(function(e){return ST[e.id].del;}).length;
  var edits=ex.filter(function(e){return ST[e.id].edited&&!ST[e.id].del&&!ST[e.id].added;}).length;
  var adds=extras.filter(function(e){return !ST[e.id].del;}).length;
  var total=dels+edits+adds;
  var active=ex.filter(function(e){return !ST[e.id].del;}).length;
  var parts=[];
  if(dels)  parts.push('<b>'+dels+'</b> محذوف');
  if(edits) parts.push('<b>'+edits+'</b> معدّل');
  if(adds)  parts.push('<b>'+adds+'</b> جديد');
  document.getElementById('bst').innerHTML=total?parts.join(' · '):'ما في تعديلات';
  document.getElementById('expBtn').disabled=(total===0);
  var sl=savedLabel();
  document.getElementById('hcnt').innerHTML='<b>'+active+'</b> تمرين'+(total?' · <b style="color:#72b01d">'+total+' تعديل</b>':'')+(sl?'<br><span style="color:var(--green);font-size:9px">✓ محفوظ '+sl+'</span>':'');
}

/* ═══ EXPORT ═══ */
function openExport(){
  var ex=allEx().filter(function(e){return !ST[e.id].del;});
  var lines=ex.map(function(e){
    var s=ST[e.id];
    var u=s.unit?",unit:'"+s.unit+"'":'';
    var al=s.alts.map(function(a){return"'"+a.replace(/'/g,"\\'")+"'";}).join(',');
    return "  {name:'"+s.name.replace(/'/g,"\\'")+"',cat:'"+s.cat+"',tier:"+s.t+u+",alts:["+al+"]}";
  });
  document.getElementById('codeBox').textContent='var STR=[\n'+lines.join(',\n')+'\n];';
  document.getElementById('expModal').classList.add('open');
}
function closeExport(){document.getElementById('expModal').classList.remove('open');}
function doCopy(){
  navigator.clipboard.writeText(document.getElementById('codeBox').textContent).then(function(){
    var b=document.getElementById('cpyBtn');
    b.textContent='✅ تم!';
    setTimeout(function(){b.textContent='📋 نسخ';},2000);
  });
}

/* ═══ DELETE SINGLE ALT & AUTO-REPLACE ═══ */
function delAlt(e,id,idx){
  e.stopPropagation();
  snapshot();
  var s=ST[id];
  var removed=s.alts[idx];
  s.alts.splice(idx,1);
  s.autoAlts=s.autoAlts||[];
  // Remove from autoAlts tracking if it was auto-generated
  var ai=s.autoAlts.indexOf(removed);
  if(ai>=0) s.autoAlts.splice(ai,1);
  // Find a replacement — same cat first, then same tier, then fallback pool
  var rep=pickReplacement(s,removed);
  if(rep){
    s.alts.splice(idx,0,rep);
    s.autoAlts.push(rep);
  }
  s.edited=true;
  render();
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

/* ═══ AUTOCOMPLETE ═══ */
var acIdx=-1;
var acMatches=[];

function acInput(){
  var q=(document.getElementById('a-name').value||'').toLowerCase().trim();
  var drop=document.getElementById('ac-drop');
  acIdx=-1;
  if(!q){drop.style.display='none';return;}
  var CATL={barbell:'BB',gymnastics:'GYM',kettlebell:'KB',dumbbell:'DB',cardio:'CARDIO'};
  var TL={1:'T1',2:'T2',3:'T3',4:'T4'};
  // Search all BASE exercises (including new ones)
  acMatches=BASE.filter(function(e){
    return e.name.toLowerCase().indexOf(q)>=0;
  }).slice(0,8);
  if(!acMatches.length){drop.style.display='none';return;}
  var html='';
  acMatches.forEach(function(e,i){
    var n=e.name;
    var qi=n.toLowerCase().indexOf(q);
    var highlighted=esc(n.slice(0,qi))+'<em>'+esc(n.slice(qi,qi+q.length))+'</em>'+esc(n.slice(qi+q.length));
    var isActive=ST[e.id]&&!ST[e.id].del;
    var isDel=ST[e.id]&&ST[e.id].del;
    html+='<div class="ac-item" data-i="'+i+'" onmousedown="acPick('+i+',event)">'
      +'<span class="ac-name">'+highlighted+'</span>'
      +'<span class="ac-meta">'
        +'<span class="bdg bdg-cat-'+e.cat+'">'+CATL[e.cat]+'</span>'
        +'<span style="color:var(--text3)">'+TL[e.t]+'</span>'
        +(isActive?'<span style="color:var(--green);font-size:10px">✓ موجود</span>':'')
        +(isDel?'<span class="ac-exists">محذوف</span>':'')
      +'</span>'
    +'</div>';
  });
  drop.innerHTML=html;
  drop.style.display='block';
}

function acKey(e){
  var drop=document.getElementById('ac-drop');
  if(drop.style.display==='none') return;
  var items=drop.querySelectorAll('.ac-item');
  if(e.key==='ArrowDown'){e.preventDefault();acIdx=Math.min(acIdx+1,items.length-1);}
  else if(e.key==='ArrowUp'){e.preventDefault();acIdx=Math.max(acIdx-1,0);}
  else if(e.key==='Enter'&&acIdx>=0){e.preventDefault();acPick(acIdx,null);return;}
  else if(e.key==='Escape'){drop.style.display='none';acIdx=-1;return;}
  items.forEach(function(el,i){el.classList.toggle('ac-sel',i===acIdx);});
}

function acPick(i,e){
  if(e) e.preventDefault();
  var ex=acMatches[i];
  if(!ex) return;
  document.getElementById('a-name').value=ex.name;
  document.getElementById('a-cat').value=ex.cat;
  document.getElementById('a-tier').value=ex.t;
  document.getElementById('a-unit').value=ex.unit||'';
  document.getElementById('a-alts').value=(ex.alts||[]).join(', ');
  document.getElementById('ac-drop').style.display='none';
  acMatches=[];acIdx=-1;
}

document.addEventListener('click',function(e){
  if(!e.target.closest('#addForm')) document.getElementById('ac-drop').style.display='none';
});

render();
</script>
