<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--or:#ff6600;--og:rgba(255,102,0,.12);--gr:#00c853;--re:#ff1744;--ye:#ffd600;--bl:#448aff;--ca:#00bcd4;--cag:rgba(0,188,212,.1);--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--bdr:#333;--bdr2:#2a2a2a;--txt:#ffffff;--txt2:#aaaaaa;--txt3:#666}
body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',sans-serif;min-height:100vh;font-size:15px}
.app{max-width:480px;margin:0 auto;padding:0 0 80px}
.steps{display:flex;gap:6px;justify-content:center;margin-bottom:18px;padding-top:16px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--bdr);flex-shrink:0;transition:all .3s}
.dot.active{background:var(--or);transform:scale(1.4)}
.dot.done{background:var(--gr)}
.bk{width:100%;background:transparent;color:var(--txt2);border:1px solid var(--bdr);border-radius:12px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;margin-top:10px;min-height:48px}
.bk:active{border-color:var(--or);color:var(--or)}
.qc{background:var(--bg2);border:0.5px solid var(--bdr2);border-radius:16px;padding:20px 16px;margin:0 4px}
.ql{font-size:11px;color:var(--or);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;font-weight:700}
.qt{font-size:19px;font-weight:600;margin-bottom:4px;line-height:1.35;color:var(--txt)}
.qs{font-size:13px;color:var(--txt2);margin-bottom:18px}
.og{display:grid;gap:9px;grid-template-columns:1fr 1fr}
.ob{background:var(--bg3);border:0.5px solid var(--bdr);border-radius:12px;padding:13px 8px;color:var(--txt);cursor:pointer;text-align:center;transition:all .15s}
.ob:active,.ob.sel{border:1.5px solid var(--or);background:var(--og);color:var(--or)}
.ob.dis{opacity:.3;pointer-events:none}
.oi{font-size:22px;display:block;margin-bottom:5px}
.on{font-size:13px;font-weight:600;display:block;color:inherit}
.od{font-size:11px;color:var(--txt3);margin-top:2px;display:block}
.ob.sel .od{color:rgba(255,102,0,.6)}
.hint{font-size:12px;color:var(--txt3);text-align:center;margin-top:12px}
.nb{width:100%;background:var(--or);color:#000;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:700;cursor:pointer;margin-top:18px;text-transform:uppercase;min-height:52px}
.nb:disabled{background:var(--bdr);color:var(--txt3)}
.td{font-size:64px;font-weight:900;color:var(--or);text-align:center;line-height:1;margin:14px 0 4px}
.tu{text-align:center;font-size:12px;color:var(--txt3);margin-bottom:18px;text-transform:uppercase;letter-spacing:2px}
input[type=range]{width:100%;-webkit-appearance:none;height:5px;border-radius:3px;background:var(--bdr);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:var(--or);cursor:pointer}
.tps{display:flex;gap:6px;margin-top:14px;justify-content:center;flex-wrap:wrap}
.tp{background:var(--bg3);border:0.5px solid var(--bdr);border-radius:20px;padding:6px 14px;font-size:13px;color:var(--txt2);cursor:pointer;font-weight:500;min-height:36px}
.tp:active{border-color:var(--or);color:var(--or)}
.wh{text-align:center;margin-bottom:20px;padding:0 4px}
.wl{font-size:13px;color:var(--or);text-transform:uppercase;letter-spacing:3px;font-weight:700}
.wn{font-size:38px;font-weight:900;line-height:1;text-transform:uppercase;color:var(--txt);font-family:'Segoe UI',sans-serif}
.wm{display:flex;gap:7px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.wb{background:var(--bg2);border:0.5px solid var(--bdr);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;color:var(--txt2)}
.wb.o{border-color:var(--or);color:var(--or);background:var(--og)}
.wb.b{border-color:var(--bl);color:var(--bl)}
.ws{background:var(--bg2);border:0.5px solid var(--bdr2);border-radius:14px;padding:18px 14px;margin:0 4px 10px}
.st{font-size:11px;color:var(--or);text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:2px;font-family:'Segoe UI',sans-serif}
.stt{font-size:16px;font-weight:600;margin-bottom:12px;padding-bottom:10px;border-bottom:0.5px solid var(--bdr2);color:var(--txt);font-family:'Segoe UI',sans-serif}
.si{font-size:13px;color:var(--txt2);padding:7px 10px;background:var(--bg3);border-radius:7px;border-left:2px solid var(--or);margin-bottom:8px;line-height:1.55;font-family:'Segoe UI',sans-serif}
.si.team{border-left-color:var(--ye)}
.si.sc{border-left-color:var(--bl)}
.rsep{padding:8px 0 2px;font-size:11px;color:var(--or);text-align:center;letter-spacing:2px;font-weight:700;text-transform:uppercase}
.er{display:flex;align-items:center;gap:9px;padding:11px 0;border-bottom:0.5px solid var(--bdr2)}
.er:last-child{border-bottom:none}
.en{width:26px;height:26px;border-radius:50%;background:var(--bg3);border:0.5px solid var(--or);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--or);flex-shrink:0}
.eb{flex:1;min-width:0}
.ename{font-size:14px;font-weight:500;color:var(--txt);margin-bottom:2px;font-family:'Segoe UI',sans-serif}
.edet{font-size:13px;color:var(--or);font-weight:700;font-family:'Segoe UI',sans-serif}
.ea{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.esb{background:var(--bg3);border:0.5px solid var(--bdr);border-radius:7px;padding:5px 9px;font-size:11px;color:var(--txt2);cursor:pointer;font-weight:600;min-height:30px;text-align:center}
.esb:active{border-color:var(--gr);color:var(--gr)}
.esb.re{color:var(--re);border-color:rgba(255,23,68,.3)}
.cb{display:flex;align-items:center;gap:9px;padding:9px 10px;margin:5px 0;background:var(--cag);border:0.5px solid rgba(0,188,212,.2);border-radius:10px}
.ci{font-size:16px;flex-shrink:0}
.cbb{flex:1;min-width:0}
.cn{font-size:13px;font-weight:700;color:var(--ca)}
.cd{font-size:11px;color:rgba(0,188,212,.7);margin-top:1px}
.ct{font-size:11px;background:rgba(0,188,212,.12);color:var(--ca);padding:2px 7px;border-radius:7px;font-weight:700;flex-shrink:0}
.csb{background:none;border:0.5px solid rgba(0,188,212,.3);border-radius:6px;padding:4px 8px;font-size:11px;color:var(--ca);cursor:pointer;font-weight:600;flex-shrink:0;min-height:28px}
.sp{background:var(--bg3);border:0.5px solid rgba(0,200,83,.2);border-radius:10px;padding:11px;margin-top:3px;display:none}
.sp.open{display:block}
.sp.cp{border-color:rgba(0,188,212,.2)}
.sh{font-size:11px;color:var(--gr);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:7px}
.sh.ch{color:var(--ca)}
.so{display:flex;flex-direction:column;gap:5px}
.soi{background:var(--bg2);border:0.5px solid var(--bdr);border-radius:7px;padding:8px 11px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;min-height:40px}
.soi:active{border-color:var(--gr)}
.soi.co:active{border-color:var(--ca)}
.soi .sn{font-size:13px;font-weight:500;color:var(--txt)}
.soi .stag{font-size:12px;color:var(--txt3)}
.gn{width:100%;background:rgba(255,23,68,.06);border:0.5px dashed rgba(255,23,68,.3);border-radius:7px;padding:8px;font-size:12px;color:var(--re);cursor:pointer;font-weight:700;margin-top:7px;min-height:38px}
.ar{display:flex;gap:8px;margin:16px 4px 0;flex-wrap:wrap}
.ab{flex:1;border:none;border-radius:11px;padding:13px 6px;font-size:12px;font-weight:700;cursor:pointer;text-transform:uppercase;min-height:48px;min-width:0}
.ab.pri{background:var(--or);color:#000}
.ab.dan{background:rgba(255,23,68,.07);color:var(--re);border:0.5px solid rgba(255,23,68,.2)}
.loading{text-align:center;padding:60px 20px}
.spinner{width:48px;height:48px;border:3px solid var(--bdr);border-top-color:var(--or);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.lt{font-size:14px;color:var(--txt2);font-weight:600}
.tst{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--gr);color:#000;padding:10px 20px;border-radius:30px;font-weight:700;font-size:13px;transition:transform .3s;z-index:999;white-space:nowrap;pointer-events:none}
.tst.show{transform:translateX(-50%) translateY(0)}
@keyframes su{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.ani{animation:su .25s ease}
@media(max-width:380px){.wn{font-size:30px}.ob{padding:10px 6px}.on{font-size:12px}}
body.light{--bg:#f5f5f5;--bg2:#ffffff;--bg3:#eeeeee;--bdr:#d8d8d8;--bdr2:#e2e2e2;--txt:#111111;--txt2:#555555;--txt3:#999999;--og:rgba(255,102,0,.10);--cag:rgba(0,150,180,.08);--ye:#b8860b}
body.light input{color:#111 !important}
body.light .nb{color:#000}
body.light .spinner{border-color:#ddd;border-top-color:var(--or)}
body[dir=rtl] .cfg-btn{right:auto;left:14px}
body[dir=rtl] .wh{text-align:center;direction:ltr}
body[dir=rtl] .st{text-align:left;direction:ltr}
body[dir=rtl] .stt{text-align:left;direction:ltr}
body[dir=rtl] .er{direction:ltr}
body[dir=rtl] .rsep{direction:ltr}
body[dir=rtl] .ql,body[dir=rtl] .wl,body[dir=rtl] .nb,body[dir=rtl] .ab,body[dir=rtl] .rsep,body[dir=rtl] .sh,body[dir=rtl] .tu,body[dir=rtl] .st{letter-spacing:0}
body[dir=rtl] .nb,body[dir=rtl] .bk,body[dir=rtl] .ab,body[dir=rtl] .ql,body[dir=rtl] .qt,body[dir=rtl] .qs,body[dir=rtl] .wl,body[dir=rtl] .on,body[dir=rtl] .od,body[dir=rtl] .tu,body[dir=rtl] .sh,body[dir=rtl] .rsep,body[dir=rtl] .hint,body[dir=rtl] .lt,body[dir=rtl] button,body[dir=rtl] .tnc-title,body[dir=rtl] .tnc-date,body[dir=rtl] .tnc-sec,body[dir=rtl] .tnc-p{font-family:'Almarai',sans-serif}
body[dir=rtl]{line-height:1.5}
.cfg-btn{position:fixed;top:14px;right:14px;z-index:150;background:var(--bg2);border:0.5px solid var(--bdr);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:19px;box-shadow:none}
.cfg-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6)}
.cfg-box{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg2);border-radius:18px 18px 0 0;padding:22px 20px 40px}
.cfg-title{font-size:15px;font-weight:700;color:var(--txt);margin-bottom:18px;text-align:center}
.cfg-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:0.5px solid var(--bdr2)}
.cfg-row:last-child{border-bottom:none}
.cfg-lbl{font-size:14px;color:var(--txt2);font-weight:600}
.cfg-seg{display:flex;background:var(--bg3);border-radius:8px;padding:2px;gap:2px}
.cfg-seg button{background:none;border:none;border-radius:6px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;color:var(--txt2)}
.cfg-seg button.on{background:var(--or);color:#fff}
.tnc-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;overflow-y:auto}
.tnc-box{max-width:480px;margin:0 auto;background:var(--bg2);min-height:100vh;padding:24px 18px 48px}
.tnc-title{font-size:18px;font-weight:800;color:var(--or);margin-bottom:4px}
.tnc-date{font-size:12px;color:var(--txt3);margin-bottom:20px}
.tnc-sec{font-size:14px;font-weight:700;color:var(--txt);margin:18px 0 6px}
.tnc-p{font-size:13px;color:var(--txt2);line-height:1.75;text-align:justify}
.wdi-btn{background:none;border:none;cursor:pointer;font-size:15px;padding:0 0 0 6px;line-height:1;opacity:0.75;transition:opacity .15s;flex-shrink:0}
.wdi-btn:hover{opacity:1}
.wdi-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;animation:fdi .15s ease}
@keyframes fdi{from{opacity:0}to{opacity:1}}
.wdi-modal{background:var(--bg);border-radius:16px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto;padding:24px 22px 22px;position:relative;box-shadow:0 12px 40px rgba(0,0,0,0.35)}
.wdi-close{position:absolute;top:12px;right:12px;background:none;border:none;cursor:pointer;font-size:18px;color:var(--txt3);line-height:1;padding:4px}
.wdi-type{font-size:11px;color:var(--or);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;font-family:'Segoe UI',sans-serif;direction:ltr;text-align:left}
.wdi-txt{font-size:13px;line-height:1.8;color:var(--txt);margin:0;text-align:justify}
.wdi-txt[dir=rtl]{font-family:'Almarai',sans-serif}
body[dir=rtl] .wdi-close{right:auto;left:12px}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="tst" id="tst"></div>
<button class="cfg-btn" onclick="openCfg()">⚙️</button>
<div class="cfg-overlay" id="cfg-overlay" onclick="closeCfg()">
  <div class="cfg-box" onclick="event.stopPropagation()">
    <div class="cfg-title" id="cfg-title">Settings</div>
    <div class="cfg-row">
      <span class="cfg-lbl" id="cfg-lang-lbl">Language</span>
      <div class="cfg-seg">
        <button id="btn-en" class="on" onclick="setLang('en')">EN</button>
        <button id="btn-ar" onclick="setLang('ar')">AR</button>
      </div>
    </div>
    <div class="cfg-row">
      <span class="cfg-lbl" id="cfg-theme-lbl">Theme</span>
      <div class="cfg-seg">
        <button id="btn-dark" class="on" onclick="setTheme('dark')">🌑 Dark</button>
        <button id="btn-light" onclick="setTheme('light')">☀️ Light</button>
      </div>
    </div>
  </div>
</div>

<div class="tnc-overlay" id="tnc-overlay"></div>
<div id="edit-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200" onclick="closeEditDetail()">
  <div id="edit-sheet" style="position:absolute;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:480px;background:var(--bg2);border:0.5px solid var(--bdr2);border-radius:18px 18px 0 0;padding:18px 18px 32px;transition:transform .25s ease" onclick="event.stopPropagation()"></div>
</div>

function setTheme(th){
  CFG.theme=th;
  localStorage.setItem('wod_cfg',JSON.stringify(CFG));
  document.body.classList.toggle('light',th==='light');
  document.getElementById('btn-dark').classList.toggle('on',th==='dark');
  document.getElementById('btn-light').classList.toggle('on',th==='light');
}
function loadCfg(){
  try{var c=JSON.parse(localStorage.getItem('wod_cfg')||'{}');
    if(c.lang)CFG.lang=c.lang;
    if(c.theme)CFG.theme=c.theme;
  }catch(e){}
  document.body.classList.toggle('light',CFG.theme==='light');
  document.body.dir=CFG.lang==='ar'?'rtl':'ltr';
  document.getElementById('btn-en').classList.toggle('on',CFG.lang==='en');
  document.getElementById('btn-ar').classList.toggle('on',CFG.lang==='ar');
  document.getElementById('btn-dark').classList.toggle('on',CFG.theme==='dark');
  document.getElementById('btn-light').classList.toggle('on',CFG.theme==='light');
  document.getElementById('cfg-title').textContent=t('s');

  document.getElementById('cfg-theme-lbl').textContent=t('theme');

}

function mkLadder(time,lv,team,cfg){
  cfg=cfg||{};
  var dir=cfg.direction||pk(['ascending','descending','pyramid']);
  var stepMap={beginner:1,intermediate:1,advanced:2,elite:2};
  var maxMap={beginner:8,intermediate:10,advanced:10,elite:12};
  var step=cfg.dynStep||cfg.step||stepMap[lv]||1;
  var reps=[];
  if(cfg.customReps&&cfg.customReps.length){
    reps=cfg.customReps;
  }else if(cfg.dynStart||cfg.dynStep){
    var ds=Math.max(cfg.dynStart||step, step); // guard: ds must be >= step
    if(dir==='descending'){
      for(var x=ds;x>=step;x-=step)reps.push(x);
    }else if(dir==='pyramid'){
      for(var x=step;x<=ds;x+=step)reps.push(x);
      for(var x=ds-step;x>=step;x-=step)reps.push(x);
    }else{
      // ascending: numRds based on time cap, not fixed level
      var numRds=Math.max(4,Math.min(Math.ceil(time*0.35),14));
      for(var i=0;i<numRds;i++)reps.push(ds+i*step);
    }
  }else{
    var maxRep=maxMap[lv]||10;
    if(dir==='ascending'){for(var i=step;i<=maxRep;i+=step)reps.push(i);}
    else if(dir==='descending'){for(var i=maxRep;i>=step;i-=step)reps.push(i);}
    else{var pN=Math.min(12,Math.floor(maxRep/step)*2-1);var half=Math.ceil(pN/2);for(var i=0;i<half;i++)reps.push((i+1)*step);for(var j=pN-half-1;j>=0;j--)reps.push((j+1)*step);}
  }
  // safety net: if reps ended up empty, fall back to level defaults
  if(!reps.length){
    var maxRep=maxMap[lv]||10;
    if(dir==='ascending'){for(var i=step;i<=maxRep;i+=step)reps.push(i);}
    else if(dir==='descending'){for(var i=maxRep;i>=step;i-=step)reps.push(i);}
    else{var pN=Math.min(12,Math.floor(maxRep/step)*2-1);var half=Math.ceil(pN/2);for(var i=0;i<half;i++)reps.push((i+1)*step);for(var j=pN-half-1;j>=0;j--)reps.push((j+1)*step);}
  }
  var exCnt=cfg.exCnt||ri(2,3);
  var chosen=pkN(getPool(lv),exCnt);
  var cardioMode=cfg.withCardio;
  var addCardio=cardioMode===true||(cardioMode===undefined&&Math.random()>.5);
  var cardioExs=addCardio?[pk(CARDIO)]:[];
  var isAsc=dir==='ascending';
  var sepLabel=isAsc?'♾️ AMRAP — '+time+' MIN CAP':'── '+reps.length+' ROUNDS ──';
  var infoK=isAsc?'i_asc_ladder':(addCardio?'i_scheme_cardio':'i_scheme');
  var infoV=isAsc?{step:step,t:time}:{scheme:reps.join(' - '),t:time};
  var items=[{kind:'sep',label:sepLabel}];
  if(isAsc){
    var ds0=reps[0]||step;
    var ascLabel=[ds0,ds0+step,ds0+step*2,ds0+step*3].join(' - ')+' ... (+'+step+' Reps/Round)';
    chosen.forEach(function(ex){items.push({kind:'str',ex:ex,detail:ascLabel,wt:wgt(lv,ex.cat)});});
  }else{
    chosen.forEach(function(ex){items.push({kind:'str',ex:ex,detail:schemeLabel(ex,reps),wt:wgt(lv,ex.cat)});});
  }
  if(addCardio)items.push({kind:'cardio',ex:cardioExs[0]});
  return[{type:'Ladder',title:'Ladder',infoKey:infoK,infoVars:infoV,scoreKey:'sc_time',teamKey:team>1?'tm_partition':null,items:items,scheme:reps,chosen:chosen,cardioExs:cardioExs,ladderCfg:cfg}];
}

function buildSchemeForRounds(dir,rounds,lv){
  var baseMap={beginner:6,intermediate:9,advanced:9,elite:12};
  var stepMap={beginner:2,intermediate:3,advanced:3,elite:5};
  var fixMap={beginner:8,intermediate:10,advanced:12,elite:15};
  var base=baseMap[lv]||9;var step=stepMap[lv]||3;var reps=[];
  if(dir==='fixed'){var f=fixMap[lv]||10;for(var i=0;i<rounds;i++)reps.push(f);}
  else if(dir==='descending'){var top=base+(rounds-1)*step;for(var i=0;i<rounds;i++)reps.push(top-i*step);}
  else if(dir==='ascending'){for(var i=0;i<rounds;i++)reps.push(base+i*step);}
  else if(dir==='pyramid'){
    var pr=rounds%2===0?rounds-1:rounds; // force odd — pyramid must have single peak
    var half=Math.ceil(pr/2);
    for(var i=0;i<half;i++)reps.push(base+i*step);
    for(var i=half-2;i>=0;i--)reps.push(base+i*step);
  }
  return reps.length?reps:getScheme(dir,lv);
}

  return[{type:'Buy-In / Cash-Out',title:'Buy-In + WOD + Cash-Out',infoKey:'i_buyin',infoVars:{r:rounds,t:time},scoreKey:'sc_time',teamKey:team>1?'tm_buyin':null,items:items,buyInCfg:cfg}];

function mkYGIG(time,lv,team,cfg){
  cfg=cfg||{};
  var eff=Math.max(team,2);
  var mode=cfg.ygMode||(Math.random()>0.5?'alternate':'split');
  var cardioMode=cfg.withCardio;

  if(mode==='split'){
    // SPLIT: 1 massive round — partners share reps on each exercise
    var hasScheme=cfg.schemeKey&&SCHEMES[cfg.schemeKey]&&!SCHEMES[cfg.schemeKey].dynamic;
    var schReps=hasScheme?SCHEMES[cfg.schemeKey].reps:[100,80,60,40,20];
    var exCnt=hasScheme?schReps.length:(cfg.exCnt||ri(4,6));
    var manualReps=cfg.splitReps;
    var chosen=pkN(getPool(lv),exCnt);
    var doCardio=cardioMode===true||(cardioMode===undefined&&Math.random()>.5);
    var items=[{kind:'sep',label:'── 1 ROUND ──'}];
    chosen.forEach(function(ex,i){
      var rep=manualReps?manualReps:schReps[i%schReps.length];
      items.push({kind:'str',ex:ex,detail:rep+' reps (shared)',wt:wgt(lv,ex.cat)});
    });
    if(doCardio)items.push({kind:'cardio',ex:pk(CARDIO)});
    return[{type:'YGIG / Partner WOD',title:'YGIG Split — 1 Round',infoKey:'i_ygig_split',infoVars:{t:time},scoreKey:'sc_time',teamKey:eff>2?'tm_ygig':null,teamVars:{n:eff},items:items,scheme:schReps,chosen:chosen,ygigCfg:cfg}];
  }

  // ALTERNATE: even rounds only, low fixed reps, normal exercises
  var evenRounds=[2,4,6,8,10];
  var rounds=cfg.rounds||pk(evenRounds);
  var repPool={beginner:[8,10],intermediate:[10,12],advanced:[12,15],elite:[15,20]};
  var baseReps=cfg.baseReps||pk(repPool[lv]||[10]);
  var exCnt=cfg.exCnt||ri(2,3);
  var chosen=pkN(getPool(lv),exCnt);
  var doCardio=cardioMode===true||(cardioMode===undefined&&Math.random()>.4);
  var items=[{kind:'sep',label:'── '+rounds+' ROUNDS ──'}];
  chosen.forEach(function(ex){items.push({kind:'str',ex:ex,detail:baseReps+' reps',wt:wgt(lv,ex.cat)});});
  if(doCardio)items.push({kind:'cardio',ex:pk(CARDIO)});
  var reps=[];for(var i=0;i<rounds;i++)reps.push(baseReps);
  return[{type:'YGIG / Partner WOD',title:'YGIG — '+rounds+' Rounds',infoKey:'i_ygig',infoVars:{t:time},scoreKey:'sc_ygig',teamKey:eff>2?'tm_ygig':null,teamVars:{n:eff},items:items,scheme:reps,chosen:chosen,ygigCfg:cfg}];
}

function mkIntervalAmrap(time,lv,team,cfg){
  cfg=cfg||{};
  var workTime=cfg.workTime||pk([4,5,6]);
  var restTime=cfg.restTime||pk([1,2]);
  var numIntervals=Math.floor((time+restTime)/(workTime+restTime));
  var exCnt=cfg.exCnt||ri(2,4);
  var repPool={beginner:[8,10],intermediate:[10,12],advanced:[12,15],elite:[15,20]};
  var baseReps=cfg.baseReps||pk(repPool[lv]||[10]);
  var cardioMode=cfg.withCardio;
  var chosen=pkN(getPool(lv),exCnt);var items=[];
  chosen.forEach(function(ex){items.push({kind:'str',ex:ex,detail:getDetail(ex,baseReps),wt:wgt(lv,ex.cat)})});
  var doCardio=cardioMode===true||(cardioMode===undefined&&Math.random()>.4);
  if(doCardio)items.push({kind:'cardio',ex:pk(CARDIO)});
  return[{type:'Interval AMRAP',title:numIntervals+' × '+workTime+'-Min AMRAP',infoKey:'i_interval',infoVars:{n:numIntervals,w:workTime,rest:restTime},scoreKey:'sc_total',teamKey:team>1?'tm_simultaneous':null,items:items,intervalCfg:cfg}];
}
function mkGroupAB(time,lv,team,cfg){
  cfg=cfg||{};
  var half=Math.round(time/2);
  var exCntA=cfg.exCntA||ri(2,3);
  var exCntB=cfg.exCntB||ri(2,3);
  var exA=pkN(getPool(lv),exCntA);var exB=pkN(getPool(lv).filter(function(e){return exA.indexOf(e)<0}),exCntB);
  var repPoolA={beginner:[8,10],intermediate:[10,12],advanced:[12,15],elite:[15,20]};
  var repPoolB={beginner:[10,12],intermediate:[12,15],advanced:[15,20],elite:[20,25]};
  var repsA=cfg.repsA||pk(repPoolA[lv]||[10]);
  var repsB=cfg.repsB||pk(repPoolB[lv]||[12]);
  function mkI(arr,r,withC){
    var its=arr.map(function(ex){return{kind:'str',ex:ex,detail:getDetail(ex,r),wt:wgt(lv,ex.cat)}});
    if(withC)its.push({kind:'cardio',ex:pk(CARDIO)});
    return its;
  }
  return[
    {type:'Group A',title:'Group A — AMRAP '+half+' Min',infoKey:'i_groupA',infoVars:{t:half},scoreKey:'sc_score_rounds',teamKey:team>1?'tm_halfA':null,items:mkI(exA,repsA,cfg.withCardioA===undefined?Math.random()>0.4:cfg.withCardioA===true),groupAbCfg:cfg},
    {type:'Group B',title:'Group B — AMRAP '+half+' Min',infoKey:'i_groupB',infoVars:{t:half},items:mkI(exB,repsB,cfg.withCardioB===undefined?Math.random()>0.5:cfg.withCardioB===true)},
  ];
}

function schemeSelectHtml(si,cfg,keys,onchangeFn){

function buildDynReps(key,cfg){
  var start=cfg.dynStart;var step=cfg.dynStep||1;
  if(!start||start<1)return null;
  var sch=SCHEMES[key];if(!sch||!sch.dynamic)return null;
  var arr=[];
  if(sch.dType==='open_desc'){
    for(var x=start;x>=1;x-=step)arr.push(x);
  }else if(sch.dType==='pyr_dyn'){
    for(var x=step;x<=start;x+=step)arr.push(x);
    for(var x=start-step;x>=step;x-=step)arr.push(x);
  }
  return arr.length?arr:null;
}
function buildAmrapDynDetail(dType,cfg){
  var start=cfg.dynStart||1;var step=cfg.dynStep||1;
  if(dType==='ascending')return start+' - '+(start+step)+' - '+(start+step*2)+' ... reps';
  if(dType==='open_desc')return start+' - '+(start-step)+' - '+(start-step*2)+' ... '+step+' reps';
  var peak=cfg.dynStart||5;
  return'1 - 2 - ... - '+peak+' - ... - 2 - 1 reps';
}

function cfgGearRow(infoTxt,toggleFn,si){
  return '<div class="si" style="display:flex;align-items:center;justify-content:space-between;gap:8px"><span>'+(infoTxt||'')+'</span><span onclick="'+toggleFn+'('+si+')" style="cursor:pointer;font-size:15px;flex-shrink:0;opacity:0.6">⚙️</span></div>';
}
function renderSecInfo(sec,si,infoTxt){
  infoTxt=infoTxt!==undefined?infoTxt:(sec.infoKey?ti(sec.infoKey,sec.infoVars||{}):sec.info);
  if(sec.type==='Chipper')return cfgGearRow(infoTxt,'toggleChipperCfg',si)+renderChipperCfg(sec,si);
  if(sec.type==='AMRAP')return cfgGearRow(infoTxt,'toggleAmrapCfg',si)+renderAmrapCfg(sec,si);
  if(sec.type==='For Time / RFT')return cfgGearRow(infoTxt,'toggleRftCfg',si)+renderRftCfg(sec,si);
  if(sec.type==='EMOM')return cfgGearRow(infoTxt,'toggleEmomCfg',si)+renderEmomCfg(sec,si);
  if(sec.type==='Interval AMRAP')return cfgGearRow(infoTxt,'toggleIntervalCfg',si)+renderIntervalCfg(sec,si);
  if(sec.type==='E2MOM')return cfgGearRow(infoTxt,'toggleE2momCfg',si)+renderE2momCfg(sec,si);
  if(sec.type==='E3MOM')return cfgGearRow(infoTxt,'toggleE3momCfg',si)+renderE3momCfg(sec,si);
  if(sec.type==='Tabata')return cfgGearRow(infoTxt,'toggleTabataCfg',si)+renderTabataCfg(sec,si);
  if(sec.type==='Death By')return cfgGearRow(infoTxt,'toggleDeathByCfg',si)+renderDeathByCfg(sec,si);
  if(sec.type==='YGIG / Partner WOD')return cfgGearRow(infoTxt,'toggleYgigCfg',si)+renderYgigCfg(sec,si);
  if(sec.type==='Buy-In / Cash-Out')return cfgGearRow(infoTxt,'toggleBuyInCfg',si)+renderBuyInCfg(sec,si);
  if(sec.type==='Couplet')return cfgGearRow(infoTxt||'','toggleCoupletCfg',si)+renderCoupletCfg(sec,si);
  if(sec.type==='Triplet')return cfgGearRow(infoTxt||'','toggleTripletCfg',si)+renderTripletCfg(sec,si);
  if(sec.type==='Ladder')return cfgGearRow(infoTxt||'','toggleLadderCfg',si)+renderLadderCfg(sec,si);
  if(sec.type==='Group A')return cfgGearRow(infoTxt,'toggleGroupAbCfg',si)+renderGroupAbCfg(sec,si);
  if(sec.scheme){
    var schHtml=sec.scheme.join(' → ');
    var schText=sec.cardioExs?ti('i_scheme_cardio',{scheme:schHtml,t:S.wod.cfg.time}):ti('i_scheme',{scheme:schHtml,t:S.wod.cfg.time});
    return'<div class="si" style="display:flex;align-items:center;justify-content:space-between;gap:8px"><span>'+schText+'</span><span onclick="openSchemeEdit('+si+')" style="cursor:pointer;font-size:16px;flex-shrink:0;opacity:0.7">✏️</span></div>';
  }
  return infoTxt?'<div class="si">'+infoTxt+'</div>':'';
}
function showWodDesc(type){
  var d=WOD_DESC[type];if(!d)return;
  var isAr=CFG.lang==='ar';
  var txt=isAr?d.ar:d.en;
  var dir=isAr?'rtl':'ltr';
  var label=(type==='Group A'||type==='Group B')?'Group A / B':type;
  var ov=document.createElement('div');
  ov.className='wdi-overlay';
  ov.innerHTML='<div class="wdi-modal"><button class="wdi-close" onclick="this.closest(\'.wdi-overlay\').remove()">✕</button>'
    +'<div class="wdi-type">'+label+'</div>'
    +'<p class="wdi-txt" dir="'+dir+'">'+txt+'</p>'
    +'</div>';
  ov.addEventListener('click',function(e){if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);
}
function renderSec(sec,si){
  var infoTxt=sec.infoKey?ti(sec.infoKey,sec.infoVars||{}):sec.info;
  var scoreTxt=sec.scoreKey?t(sec.scoreKey):sec.score;
  var teamTxt=sec.teamKey?ti(sec.teamKey,sec.teamVars||{}):sec.team;
  var roundsBadge='';
  var hasDesc=!!WOD_DESC[sec.type];
  var stInner=sec.type+(hasDesc?'<button class="wdi-btn" onclick="showWodDesc(\''+sec.type+'\')">ⓘ</button>':'');
  return'<div class="ws ani" id="sec-'+si+'"><div class="st" style="display:flex;align-items:center;justify-content:space-between">'+stInner+'</div><div class="stt">'+sec.title+'</div>'+roundsBadge
  +renderSecInfo(sec,si,infoTxt)
  +(scoreTxt?'<div class="si sc">🏆 '+scoreTxt+'</div>':'')
  +(teamTxt?'<div class="si team">👥 '+teamTxt+'</div>':'')
  +'<div>'+renderItems(sec.items,si)+'</div></div>';
}
function renderItems(items,si){var sn=0;return items.map(function(it,ii){
  if(it.kind==='sep')return'<div class="rsep">'+it.label+'</div>';
  if(it.kind==='scheme-header')return'<div style="font-size:13px;font-weight:700;color:var(--or);margin:10px 0 6px;letter-spacing:1px;text-transform:uppercase">'+it.label+'</div>';
  if(it.kind==='buyin')return renderCardio(it,si,ii);

  if(it.kind==='cardio')return renderCardio(it,si,ii);
  sn++;return renderStr(it,si,ii,sn);
}).join('')}

  +'</div></div>';

function splitCName(name){var m=name.match(/^([\D]*?)(\d+)([\s\S]*)$/);return m?{b:m[1],n:parseInt(m[2],10),a:m[3]}:{b:name,n:null,a:''}}

function manualSwap(si,ii){
  var nEl=document.getElementById('mn-'+si+'-'+ii);
  var dEl=document.getElementById('md-'+si+'-'+ii);
  if(!nEl||!nEl.value.trim())return toast('Enter exercise name','#ff6600');
  var old=S.wod.sections[si].items[ii];
  var newEx={name:nEl.value.trim(),alts:[],cat:'gymnastics'};
  S.wod.sections[si].items[ii]=Object.assign({},old,{ex:newEx,detail:dEl&&dEl.value.trim()?dEl.value.trim():old.detail});
  reRenderSec(si);toast('✅ Done!');
}
function toggleSwap(si,ii){var p=document.getElementById('sp-'+si+'-'+ii);if(p)p.classList.toggle('open')}
function swapStr(si,ii,name){
  var found=null;for(var i=0;i<STR.length;i++){if(STR[i].name===name){found=STR[i];break}}
  if(!found)found={name:name,alts:[],cat:'gymnastics'};
  var old=S.wod.sections[si].items[ii];
  S.wod.sections[si].items[ii]=Object.assign({},old,{ex:found,wt:wgt(S.level,found.cat)});
  reRenderSec(si);toast('✅ Swapped!');
}
function stripCardioNum(s){return s.replace(/\s+\d+(\s*[a-z]+\.?)?$/i,'').trim();}
function tabataCardioEx(obj){
  return{name:stripCardioNum(obj.name),alts:(obj.alts||[]).map(stripCardioNum),_raw:obj.name};
}
function swapCardio(si,ii,name){
  var found=null;for(var i=0;i<CARDIO.length;i++){if(CARDIO[i].name===name){found=CARDIO[i];break}}
  if(!found)found={name:name,alts:[]};
  var sec=S.wod.sections[si];
  var old=sec.items[ii];
  var exObj=sec.type==='Tabata'?tabataCardioEx(found):found;
  sec.items[ii]=Object.assign({},old,{ex:exObj});
  reRenderSec(si);toast('✅ Swapped!');
}
function regenEx(si,ii,kind){
  var old=S.wod.sections[si].items[ii];
  var sec=S.wod.sections[si];
  var isTabata=sec.type==='Tabata';
  var newEx;
  if(kind==='cardio'){
    do{newEx=pk(CARDIO);}while(newEx.name===(old.ex&&old.ex._raw||old.ex&&old.ex.name));
    if(isTabata){
      S.wod.sections[si].items[ii]=Object.assign({},old,{ex:tabataCardioEx(newEx)});
    }else{
      S.wod.sections[si].items[ii]=Object.assign({},old,{ex:newEx});
    }
  }else{
    do{newEx=pk(getPool(S.level));}while(newEx.name===old.ex.name);
    if(isTabata){
      S.wod.sections[si].items[ii]=Object.assign({},old,{ex:newEx,detail:'20s on / 10s off × 8',wt:null,noEdit:true});
    }else{
      var newDetail;
      if(sec.scheme&&sec.scheme.length){
        newDetail=schemeLabel(newEx,sec.scheme);
      }else{
        var oldUnit=old.ex?old.ex.unit||'reps':'reps';var newUnit=newEx.unit||'reps';
        newDetail=oldUnit===newUnit?old.detail:getDetail(newEx,parseInt(old.detail)||10);
      }
      S.wod.sections[si].items[ii]=Object.assign({},old,{ex:newEx,detail:newDetail,wt:wgt(S.level,newEx.cat)});
    }
  }
  reRenderSec(si);toast('⟳ New exercise!','#ff6600');
}
function reRenderSec(si){
  var sec=S.wod.sections[si];var el=document.getElementById('sec-'+si);
  if(!el)return;var tmp=document.createElement('div');tmp.innerHTML=renderSec(sec,si);
  el.parentNode.replaceChild(tmp.firstElementChild,el);
}
function regen(){
  if(S.wod){
    if(!S.cfgStore)S.cfgStore={};
    S.wod.sections.forEach(function(sec){
      if(sec.amrapCfg&&Object.keys(sec.amrapCfg).length)S.cfgStore['amrap']=sec.amrapCfg;
      if(sec.rftCfg&&Object.keys(sec.rftCfg).length)S.cfgStore['for-time']=sec.rftCfg;
      if(sec.chipperCfg&&Object.keys(sec.chipperCfg).length)S.cfgStore['chipper']=sec.chipperCfg;
      if(sec.emomCfg&&Object.keys(sec.emomCfg).length)S.cfgStore['emom']=sec.emomCfg;
      if(sec.intervalCfg&&Object.keys(sec.intervalCfg).length)S.cfgStore['interval-amrap']=sec.intervalCfg;
      if(sec.e2momCfg&&Object.keys(sec.e2momCfg).length)S.cfgStore['e2mom']=sec.e2momCfg;
      if(sec.e3momCfg&&Object.keys(sec.e3momCfg).length)S.cfgStore['e3mom']=sec.e3momCfg;
      if(sec.tabataCfg&&Object.keys(sec.tabataCfg).length)S.cfgStore['tabata']=sec.tabataCfg;
      if(sec.deathByCfg&&Object.keys(sec.deathByCfg).length)S.cfgStore['death-by']=sec.deathByCfg;
      if(sec.ladderCfg&&Object.keys(sec.ladderCfg).length)S.cfgStore['ladder']=sec.ladderCfg;
      if(sec.buyInCfg&&Object.keys(sec.buyInCfg).length)S.cfgStore['buy-in-cashout']=sec.buyInCfg;
      if(sec.ygigCfg&&Object.keys(sec.ygigCfg).length)S.cfgStore['ygig']=sec.ygigCfg;
      if(sec.coupletCfg&&Object.keys(sec.coupletCfg).length)S.cfgStore['couplet']=sec.coupletCfg;
      if(sec.tripletCfg&&Object.keys(sec.tripletCfg).length)S.cfgStore['triplet']=sec.tripletCfg;
      if(sec.groupAbCfg&&Object.keys(sec.groupAbCfg).length)S.cfgStore['group-ab']=sec.groupAbCfg;
    });
  }
  S.wod=null;step4();
}
function copyWod(){
  var w=S.wod;var txt='🏋️ WOD: '+S.wodName+'\n'+LL[S.level]+' | '+S.time+' min'+(S.teamSize>1?' | Team of '+S.teamSize:'')+'\n\n';
  w.sections.forEach(function(s){
    txt+='━━ '+s.title+' ━━\n'+(s.info||'')+'\n'+(s.score?'🏆 '+s.score+'\n':'')+'\n';
    s.items.forEach(function(it){
      if(it.kind==='sep'||it.kind==='buyin'||it.kind==='scheme-header'){txt+=it.label+'\n';return;}
      if(it.kind==='cardio'){txt+='  💨 '+it.ex.name+(it.detail?' — '+it.detail:'')+'\n';return;}
      txt+='  '+it.ex.name+' — '+(it.detail||'')+'\n';
    });txt+='\n';
  });
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(function(){toast('📋 Copied!');}).catch(function(){fbCopy(txt);});}else{fbCopy(txt);}
}
function fbCopy(txt){
  var ta=document.createElement('textarea');ta.value=txt;ta.style.cssText='position:fixed;opacity:0;top:0;left:0';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');toast('📋 Copied!');}catch(e){toast('Long-press to copy','#ff6600');}
  document.body.removeChild(ta);
}
function render(){var fns=[step0,step1,step2,step3,step4];var fn=fns[S.step];if(fn)fn()}

function toggleChipperCfg(si){
  var el=document.getElementById('chipper-cfg-'+si);
  if(el)el.style.display=el.style.display==='none'?'block':'none';
}
function setChipperVal(si,key,val,btn){
  var sec=S.wod.sections[si];
  if(!sec.chipperCfg)sec.chipperCfg={};
  var parent=btn.parentElement;
  Array.from(parent.children).forEach(function(b){b.style.background='var(--bg2)';b.style.borderColor='var(--bdr)';b.style.color='var(--txt2)';});
  if(sec.chipperCfg[key]===val){delete sec.chipperCfg[key];return;}
  sec.chipperCfg[key]=val;
  btn.style.background='var(--or)';btn.style.borderColor='var(--or)';btn.style.color='#000';
}
function setChipperRepsCustom(si,inp){
  var val=parseInt(inp.value);
  if(!val||val<1)return;
  var sec=S.wod.sections[si];
  if(!sec.chipperCfg)sec.chipperCfg={};
  sec.chipperCfg.baseReps=val;
  var parent=inp.parentElement;

    +'<div style="font-size:13px;color:var(--txt2);margin-bottom:14px;font-weight:500">'+t('gate_hint')+'</div>'
    +'<input id="gate-email" type="email" placeholder="your@email.com" autocomplete="email"'
    +' style="width:100%;background:var(--bg2);border:1.5px solid var(--bdr);border-radius:12px;padding:16px;font-size:15px;font-weight:600;color:var(--txt);text-align:center;outline:none;margin-bottom:10px"'
    +' onkeydown="if(event.key===\'Enter\')document.getElementById(\'gate-inp\').focus()">'
    +'<input id="gate-inp" type="text" placeholder="WOD-XXXX-XXXX" autocomplete="off" autocapitalize="characters"'
    +' style="width:100%;background:var(--bg2);border:1.5px solid var(--bdr);border-radius:12px;padding:16px;font-size:18px;font-weight:800;color:var(--or);text-align:center;outline:none;letter-spacing:3px;margin-bottom:12px"'
    +' oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key===\'Enter\')tryCode()">'
    +'<button onclick="tryCode()" style="width:100%;background:var(--or);border:none;border-radius:12px;padding:15px;font-size:14px;font-weight:700;color:#000;cursor:pointer;margin-bottom:16px">'+t('enter')+'</button>'
    +'<a href="'+CHECKOUT_URL+'" target="_blank" style="display:block;color:var(--txt2);font-size:15px;text-decoration:none;margin-bottom:10px">'+t('buy')+'</a>'
    +'<button onclick="showTnC()" style="background:none;border:none;color:var(--txt3);font-size:11px;cursor:pointer;text-decoration:underline">'+t('tnc')+'</button>'
    +'</div></div>';
  setTimeout(function(){var i=document.getElementById('gate-email');if(i)i.focus();},100);
}
function tryCode(){
  var emailInp=document.getElementById('gate-email');
  var inp=document.getElementById('gate-inp');
  var email=(emailInp&&emailInp.value.trim().toLowerCase())||'';
  var val=(inp&&inp.value.trim().toUpperCase())||'';
  if(!email||!val)return;
  var btn=document.querySelector('button[onclick="tryCode()"]');
  if(btn){btn.disabled=true;btn.textContent=t('checking');}
  verifyCode(email,val,function(ok){
    if(btn){btn.disabled=false;btn.textContent=t('enter');}
    if(!ok){
      if(inp)inp.style.borderColor='var(--re)';
      if(emailInp)emailInp.style.borderColor='var(--re)';
      toast(t('invalid'),'#ff1744');
      setTimeout(function(){if(inp)inp.style.borderColor='var(--bdr)';if(emailInp)emailInp.style.borderColor='var(--bdr)';},1500);
      return;
    }
    localStorage.setItem(AUTH_KEY,JSON.stringify({email:email,password:val}));
    inp.style.borderColor='var(--gr)';
    app.innerHTML=
      '<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;text-align:center">'
      +'<div style="font-size:48px;margin-bottom:16px">✅</div>'
      +'<div style="font-size:18px;font-weight:700;color:var(--gr);margin-bottom:8px">'+t('granted')+'</div>'
      +'<div style="font-size:13px;color:var(--txt2);margin-bottom:20px;line-height:1.6">'+t('save_pw')+'</div>'
      +'<div style="background:var(--bg2);border:1px solid var(--gr);border-radius:12px;padding:14px 24px;margin-bottom:16px">'
      +'<div style="font-size:11px;color:var(--txt3);margin-bottom:4px">'+t('your_pw')+'</div>'
      +'<div style="font-size:22px;font-weight:900;color:var(--or);letter-spacing:4px">'+val+'</div>'
      +'</div>'
      +'<button onclick="copyCode(\''+val+'\')" style="background:var(--bg2);border:1px solid var(--gr);border-radius:10px;padding:10px 24px;color:var(--gr);font-size:13px;font-weight:700;cursor:pointer;margin-bottom:24px">'+t('copy_pw')+'</button>'
      +'<button onclick="render()" style="background:var(--or);border:none;border-radius:12px;padding:14px 32px;font-size:14px;font-weight:700;color:#000;cursor:pointer">'+t('start')+'</button>'
      +'</div>';
  });
}
function copyCode(c){
  if(navigator.clipboard)navigator.clipboard.writeText(c).then(function(){toast('📋 Password copied!')});
  else{var el=document.createElement('textarea');el.value=c;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);toast('📋 Password copied!');}
}
loadCfg();
checkAccess();
function setTripletVal(si,key,val,btn){
  var sec=S.wod.sections[si];if(!sec.tripletCfg)sec.tripletCfg={};
  var parent=btn.parentElement;
  Array.from(parent.children).forEach(function(b){b.style.background='var(--bg2)';b.style.borderColor='var(--bdr)';b.style.color='var(--txt2)';});
  if(sec.tripletCfg[key]===val){delete sec.tripletCfg[key];return;}
  sec.tripletCfg[key]=val;btn.style.background='var(--or)';btn.style.borderColor='var(--or)';btn.style.color='#000';
}
</script>
