<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CrossFit WOD Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--or:#ff6600;--og:rgba(255,102,0,.12);--gr:#00c853;--re:#ff1744;--ye:#ffd600;--bl:#448aff;--ca:#00bcd4;--cag:rgba(0,188,212,.1);--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--bdr:#333;--bdr2:#2a2a2a;--txt:#ffffff;--txt2:#aaaaaa;--txt3:#666}
body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',sans-serif;min-height:100vh;font-size:15px}
.app{max-width:480px;margin:0 auto;padding:0 0 80px}
.steps{display:flex;gap:6px;justify-content:center;margin-bottom:18px;padding-top:16px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--bdr);flex-shrink:0;transition:all .3s}
.dot.active{background:var(--or);transform:scale(1.4)}
.dot.done{background:var(--gr)}
.bk{width:100%;background:transparent;color:var(--txt2);border:1px solid var(--bdr);border-radius:12px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;margin-top:10px;min-height:48px}
.bk:active{border-color:var(--or);color:var(--or)}
.qc{background:var(--bg2);border:0.5px solid var(--bdr2);border-radius:16px;padding:20px 16px;margin:0 4px}
.ql{font-size:11px;color:var(--or);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;font-weight:700}
.qt{font-size:19px;font-weight:600;margin-bottom:4px;line-height:1.35;color:var(--txt)}
.qs{font-size:13px;color:var(--txt2);margin-bottom:18px}
.og{display:grid;gap:9px;grid-template-columns:1fr 1fr}
.ob{background:var(--bg3);border:0.5px solid var(--bdr);border-radius:12px;padding:13px 8px;color:var(--txt);cursor:pointer;text-align:center;transition:all .15s}
.ob:active,.ob.sel{border:1.5px solid var(--or);background:var(--og);color:var(--or)}
.ob.dis{opacity:.3;pointer-events:none}
.oi{font-size:22px;display:block;margin-bottom:5px}
.on{font-size:13px;font-weight:600;display:block;color:inherit}
.od{font-size:11px;color:var(--txt3);margin-top:2px;display:block}
.ob.sel .od{color:rgba(255,102,0,.6)}
.hint{font-size:12px;color:var(--txt3);text-align:center;margin-top:12px}
.nb{width:100%;background:var(--or);color:#000;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:700;cursor:pointer;margin-top:18px;text-transform:uppercase;min-height:52px}
.nb:disabled{background:var(--bdr);color:var(--txt3)}
.td{font-size:64px;font-weight:900;color:var(--or);text-align:center;line-height:1;margin:14px 0 4px}
.tu{text-align:center;font-size:12px;color:var(--txt3);margin-bottom:18px;text-transform:uppercase;letter-spacing:2px}
input[type=range]{width:100%;-webkit-appearance:none;height:5px;border-radius:3px;background:var(--bdr);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:var(--or);cursor:pointer}
.tps{display:flex;gap:6px;margin-top:14px;justify-content:center;flex-wrap:wrap}
.tp{background:var(--bg3);border:0.5px solid var(--bdr);border-radius:20px;padding:6px 14px;font-size:13px;color:var(--txt2);cursor:pointer;font-weight:500;min-height:36px}
.tp:active{border-color:var(--or);color:var(--or)}
.wh{text-align:center;margin-bottom:20px;padding:0 4px}
.wl{font-size:13px;color:var(--or);text-transform:uppercase;letter-spacing:3px;font-weight:700}
.wn{font-size:38px;font-weight:900;line-height:1;text-transform:uppercase;color:var(--txt);font-family:'Segoe UI',sans-serif}
.wm{display:flex;gap:7px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.wb{background:var(--bg2);border:0.5px solid var(--bdr);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;color:var(--txt2)}
.wb.o{border-color:var(--or);color:var(--or);background:var(--og)}
.wb.b{border-color:var(--bl);color:var(--bl)}
.ws{background:var(--bg2);border:0.5px solid var(--bdr2);border-radius:14px;padding:18px 14px;margin:0 4px 10px}
.st{font-size:11px;color:var(--or);text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:2px;font-family:'Segoe UI',sans-serif}
.stt{font-size:16px;font-weight:600;margin-bottom:12px;padding-bottom:10px;border-bottom:0.5px solid var(--bdr2);color:var(--txt);font-family:'Segoe UI',sans-serif}
.si{font-size:13px;color:var(--txt2);padding:7px 10px;background:var(--bg3);border-radius:7px;border-left:2px solid var(--or);margin-bottom:8px;line-height:1.55;font-family:'Segoe UI',sans-serif}
.si.team{border-left-color:var(--ye)}
.si.sc{border-left-color:var(--bl)}
.rsep{padding:8px 0 2px;font-size:11px;color:var(--or);text-align:center;letter-spacing:2px;font-weight:700;text-transform:uppercase}
.er{display:flex;align-items:center;gap:9px;padding:11px 0;border-bottom:0.5px solid var(--bdr2);transition:opacity .15s}
.er.drg-over{background:var(--og);border-radius:8px}
.edh{font-size:16px;color:var(--txt3);cursor:grab;flex-shrink:0;padding:0 2px;opacity:0.45;user-select:none;touch-action:none}
.edh:active{cursor:grabbing;opacity:0.9}
.er:last-child{border-bottom:none}
.en{width:26px;height:26px;border-radius:50%;background:var(--bg3);border:0.5px solid var(--or);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--or);flex-shrink:0;cursor:pointer;user-select:none;-webkit-user-select:none}
.en.reo-src{background:var(--or);color:#000;box-shadow:0 0 0 3px rgba(255,120,0,0.25)}
.en.reo-tgt{background:var(--bg2);border-style:dashed;animation:reo-pulse 1s infinite alternate}
@keyframes reo-pulse{from{border-color:var(--or);color:var(--or)}to{border-color:rgba(255,120,0,0.3);color:rgba(255,120,0,0.4)}}
.eb{flex:1;min-width:0}
.ename{font-size:14px;font-weight:500;color:var(--txt);margin-bottom:2px;font-family:'Segoe UI',sans-serif}
.edet{font-size:13px;color:var(--or);font-weight:700;font-family:'Segoe UI',sans-serif}
.ea{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.esb{background:var(--bg3);border:0.5px solid var(--bdr);border-radius:7px;padding:5px 9px;font-size:11px;color:var(--txt2);cursor:pointer;font-weight:600;min-height:30px;text-align:center}
.esb:active{border-color:var(--gr);color:var(--gr)}
.esb.re{color:var(--re);border-color:rgba(255,23,68,.3)}
.cb{display:flex;align-items:center;gap:9px;padding:9px 10px;margin:5px 0;background:var(--cag);border:0.5px solid rgba(0,188,212,.2);border-radius:10px}
.ci{font-size:16px;flex-shrink:0}
.cbb{flex:1;min-width:0}
.cn{font-size:14px;font-weight:700;color:var(--ca)}
.cd{font-size:11px;color:rgba(0,188,212,.7);margin-top:1px}
.ct{font-size:11px;background:rgba(0,188,212,.12);color:var(--ca);padding:2px 7px;border-radius:7px;font-weight:700;flex-shrink:0}
.csb{background:none;border:0.5px solid rgba(0,188,212,.3);border-radius:6px;padding:4px 8px;font-size:11px;color:var(--ca);cursor:pointer;font-weight:600;flex-shrink:0;min-height:28px}
.sp{background:var(--bg3);border:0.5px solid rgba(0,200,83,.2);border-radius:10px;padding:11px;margin-top:3px;display:none}
.sp.open{display:block}
.sp.cp{border-color:rgba(0,188,212,.2)}
.sh{font-size:11px;color:var(--gr);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:7px}
.sh.ch{color:var(--ca)}
.so{display:flex;flex-direction:column;gap:5px}
.soi{background:var(--bg2);border:0.5px solid var(--bdr);border-radius:7px;padding:8px 11px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;min-height:40px}
.soi:active{border-color:var(--gr)}
.soi.co:active{border-color:var(--ca)}
.soi .sn{font-size:13px;font-weight:500;color:var(--txt)}
.soi .stag{font-size:12px;color:var(--txt3)}
.gn{width:100%;background:rgba(255,23,68,.06);border:0.5px dashed rgba(255,23,68,.3);border-radius:7px;padding:8px;font-size:12px;color:var(--re);cursor:pointer;font-weight:700;margin-top:7px;min-height:38px}
.ar{display:flex;gap:8px;margin:16px 4px 0;flex-wrap:wrap}
.ab{flex:1;border:none;border-radius:11px;padding:13px 6px;font-size:12px;font-weight:700;cursor:pointer;text-transform:uppercase;min-height:48px;min-width:0}
.ab.pri{background:var(--or);color:#000}
.ab.dan{background:rgba(255,23,68,.07);color:var(--re);border:0.5px solid rgba(255,23,68,.2)}
.loading{text-align:center;padding:60px 20px}
.spinner{width:48px;height:48px;border:3px solid var(--bdr);border-top-color:var(--or);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.lt{font-size:14px;color:var(--txt2);font-weight:600}
.tst{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--gr);color:#000;padding:10px 20px;border-radius:30px;font-weight:700;font-size:13px;transition:transform .3s;z-index:999;white-space:nowrap;pointer-events:none}
.tst.show{transform:translateX(-50%) translateY(0)}
@keyframes su{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.ani{animation:su .25s ease}
@media(max-width:380px){.wn{font-size:30px}.ob{padding:10px 6px}.on{font-size:12px}}
body.light{--bg:#f5f5f5;--bg2:#ffffff;--bg3:#eeeeee;--bdr:#d8d8d8;--bdr2:#e2e2e2;--txt:#111111;--txt2:#555555;--txt3:#999999;--og:rgba(255,102,0,.10);--cag:rgba(0,150,180,.08);--ye:#b8860b}
body.light input{color:#111 !important}
body.light .nb{color:#000}
body.light .spinner{border-color:#ddd;border-top-color:var(--or)}
body[dir=rtl] .cfg-btn{right:auto;left:14px}
body[dir=rtl] .wh{text-align:center;direction:ltr}
body[dir=rtl] .st{text-align:left;direction:ltr}
body[dir=rtl] .stt{text-align:left;direction:ltr}
body[dir=rtl] .er{direction:ltr}
body[dir=rtl] .cb{direction:ltr}
body[dir=rtl] .rsep{direction:ltr}
body[dir=rtl] .soi{direction:ltr}
body[dir=rtl] .cfg-row{direction:ltr}
body[dir=rtl] .ar{direction:ltr}
body[dir=rtl] .ql,body[dir=rtl] .wl,body[dir=rtl] .nb,body[dir=rtl] .ab,body[dir=rtl] .sh,body[dir=rtl] .tu{letter-spacing:0}
body[dir=rtl] .nb,body[dir=rtl] .bk,body[dir=rtl] .ab,body[dir=rtl] .ql,body[dir=rtl] .qt,body[dir=rtl] .qs,body[dir=rtl] .wl,body[dir=rtl] .on,body[dir=rtl] .od,body[dir=rtl] .tu,body[dir=rtl] .sh,body[dir=rtl] .hint,body[dir=rtl] .lt,body[dir=rtl] button,body[dir=rtl] .tnc-title,body[dir=rtl] .tnc-date,body[dir=rtl] .tnc-sec,body[dir=rtl] .tnc-p{font-family:'Almarai',sans-serif}
body[dir=rtl]{line-height:1.5}
.cfg-btn{position:fixed;top:14px;right:14px;z-index:150;background:var(--bg2);border:0.5px solid var(--bdr);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:19px;box-shadow:none}
.cfg-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6)}
.cfg-box{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg2);border-radius:18px 18px 0 0;padding:22px 20px 40px}
.cfg-title{font-size:15px;font-weight:700;color:var(--txt);margin-bottom:18px;text-align:center}
.cfg-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:0.5px solid var(--bdr2)}
.cfg-row:last-child{border-bottom:none}
.cfg-lbl{font-size:14px;color:var(--txt2);font-weight:600}
.cfg-seg{display:flex;background:var(--bg3);border-radius:8px;padding:2px;gap:2px}
.cfg-seg button{background:none;border:none;border-radius:6px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;color:var(--txt2)}
.cfg-seg button.on{background:var(--or);color:#fff}
.tnc-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;overflow-y:auto}
.tnc-box{max-width:480px;margin:0 auto;background:var(--bg2);min-height:100vh;padding:24px 18px 48px}
.tnc-title{font-size:18px;font-weight:800;color:var(--or);margin-bottom:4px}
.tnc-date{font-size:12px;color:var(--txt3);margin-bottom:20px}
.tnc-sec{font-size:14px;font-weight:700;color:var(--txt);margin:18px 0 6px}
.tnc-p{font-size:13px;color:var(--txt2);line-height:1.75;text-align:justify}
.wdi-btn{background:none;border:none;cursor:pointer;font-size:15px;padding:0 0 0 6px;line-height:1;opacity:0.75;transition:opacity .15s;flex-shrink:0}
.wdi-btn:hover{opacity:1}
.wdi-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;animation:fdi .15s ease}
@keyframes fdi{from{opacity:0}to{opacity:1}}
.wdi-modal{background:var(--bg);border-radius:16px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto;padding:24px 22px 22px;position:relative;box-shadow:0 12px 40px rgba(0,0,0,0.35)}
.wdi-close{position:absolute;top:12px;right:12px;background:none;border:none;cursor:pointer;font-size:18px;color:var(--txt3);line-height:1;padding:4px}
.wdi-type{font-size:11px;color:var(--or);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;font-family:'Segoe UI',sans-serif;direction:ltr;text-align:left}
.wdi-txt{font-size:13px;line-height:1.8;color:var(--txt);margin:0;text-align:justify}
.wdi-txt[dir=rtl]{font-family:'Almarai',sans-serif}
body[dir=rtl] .wdi-close{right:auto;left:12px}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="tst" id="tst"></div>
<button class="cfg-btn" onclick="openCfg()">⚙️</button>
<div class="cfg-overlay" id="cfg-overlay" onclick="closeCfg()">
  <div class="cfg-box" onclick="event.stopPropagation()">
    <div class="cfg-title" id="cfg-title">Settings</div>
    <div class="cfg-row">
      <span class="cfg-lbl" id="cfg-lang-lbl">Language</span>
      <div class="cfg-seg">
        <button id="btn-en" class="on" onclick="setLang('en')">EN</button>
        <button id="btn-ar" onclick="setLang('ar')">AR</button>
      </div>
    </div>
    <div class="cfg-row">
      <span class="cfg-lbl" id="cfg-theme-lbl">Theme</span>
      <div class="cfg-seg">
        <button id="btn-dark" class="on" onclick="setTheme('dark')">🌑 Dark</button>
        <button id="btn-light" onclick="setTheme('light')">☀️ Light</button>
      </div>
    </div>
  </div>
</div>

<div class="tnc-overlay" id="tnc-overlay"></div>
<div id="edit-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200" onclick="closeEditDetail()">
  <div id="edit-sheet" style="position:absolute;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:480px;background:var(--bg2);border:0.5px solid var(--bdr2);border-radius:18px 18px 0 0;padding:18px 18px 32px;transition:transform .25s ease;direction:ltr" onclick="event.stopPropagation()"></div>
</div>

function t(k){return T[CFG.lang][k]||T.en[k]||k;}
function ti(k,v){var s=t(k);if(v)Object.keys(v).forEach(function(p){s=s.replace(new RegExp('{'+p+'}','g'),v[p]);});return s;}
function openCfg(){document.getElementById('cfg-overlay').style.display='block';}
function closeCfg(){document.getElementById('cfg-overlay').style.display='none';}
function setLang(l){
  CFG.lang=l;
  localStorage.setItem('wod_cfg',JSON.stringify(CFG));
  document.getElementById('btn-en').classList.toggle('on',l==='en');
  document.getElementById('btn-ar').classList.toggle('on',l==='ar');
  document.getElementById('cfg-title').textContent=t('s');
  document.getElementById('cfg-lang-lbl').textContent=t('language');
  document.getElementById('cfg-theme-lbl').textContent=t('theme');
  document.getElementById('btn-dark').textContent=(l==='ar'?'🌑 داكن':'🌑 Dark');
  document.getElementById('btn-light').textContent=(l==='ar'?'☀️ فاتح':'☀️ Light');
  document.body.dir=l==='ar'?'rtl':'ltr';
  closeCfg();
  if(document.getElementById('tnc-overlay').style.display==='block'){renderTnC();return;}
  if(document.getElementById('gate-email')||document.getElementById('gate-inp')){showGate();}
  else if(S.step===4&&S.wod){renderWod();}
  else{render();}
}
function setTheme(th){
  CFG.theme=th;
  localStorage.setItem('wod_cfg',JSON.stringify(CFG));
  document.body.classList.toggle('light',th==='light');
  document.getElementById('btn-dark').classList.toggle('on',th==='dark');
  document.getElementById('btn-light').classList.toggle('on',th==='light');
}
function loadCfg(){
  try{var c=JSON.parse(localStorage.getItem('wod_cfg')||'{}');
    if(c.lang)CFG.lang=c.lang;
    if(c.theme)CFG.theme=c.theme;
  }catch(e){}
  document.body.classList.toggle('light',CFG.theme==='light');
  document.body.dir=CFG.lang==='ar'?'rtl':'ltr';
  document.getElementById('btn-en').classList.toggle('on',CFG.lang==='en');
  document.getElementById('btn-ar').classList.toggle('on',CFG.lang==='ar');
  document.getElementById('btn-dark').classList.toggle('on',CFG.theme==='dark');
  document.getElementById('btn-light').classList.toggle('on',CFG.theme==='light');
  document.getElementById('cfg-title').textContent=t('s');

  {
    // ── Limits ──

    // ── Step & cap per pattern ──
    var _clStep=({'flat_5_25':5,'flat_5':5,'flat_10':10,'flat_20':20,'desc_10':10,'desc_20':20,'asc_10':10,'asc_20':20})[_clPat]||10;

        else{var _dnPick=pk(_dnK);
          if(_dnPick==='reps'){if(_isFlat){_snapBase=_flatDn2(_snapBase);repsArr=chosen.map(function(){return _snapBase;});}else{_dTop-=_clStep;repsArr=_descGen(_dTop);}}
          else if(_dnPick==='cardio'){cEx=_cardioDn(cEx,_clCL);}
          else if(_dnPick==='exercise'){chosen.pop();exCnt--;repsArr=_isFlat?repsArr.slice(0,chosen.length):_descGen(_dTop);}
          else if(_dnPick==='swap-cardio'){cEx=_swapCardio(cEx,_clCL);}
        }
      }else{
        var _upK=[];
        if(_isFlat){if(!cfg.baseReps&&_flatUp2(_snapBase)!==_snapBase){_upK.push('reps');_upK.push('reps');_upK.push('reps');}}
        else{if(!cfg.baseReps&&_dTop+_clStep<=_clCap){_upK.push('reps');_upK.push('reps');_upK.push('reps');}}
        if(!_clCardioRemoved&&!cfg.cardioAmt){

        if(_upPick==='reps'){if(_isFlat){_snapBase=_flatUp2(_snapBase);repsArr=chosen.map(function(){return _snapBase;});}else{_dTop+=_clStep;repsArr=_descGen(_dTop);}}
        else if(_upPick==='add-cardio'){var _sc2=pk(CARDIO);addCardio=true;cEx=Object.assign({},_sc2,{amount:_cardioInitAmt(_sc2.unit,_clCL)});}

  }

  if(_clCardioN<=1){

  var _clInfo=CFG.lang==='ar'?_clInfoAr:_clInfoEn;
  return[{type:'Chipper',title:'Chipper — For Time',info:_clInfo,scoreKey:'sc_time',teamKey:team>1?'tm_shared':null,items:items,chipperCfg:cfg}];

function mkLadder(time,lv,team,cfg){
  cfg=cfg||{};
  var dir=cfg.direction||pk(['ascending','descending']);
  var stepMap={beginner:1,intermediate:2,advanced:3,elite:5};
  var maxMap={beginner:8,intermediate:10,advanced:15,elite:25};

  if(cfg.customReps&&cfg.customReps.length){
    reps=cfg.customReps;
  }else if(cfg.dynStart||cfg.dynStep){
    var ds=Math.max(cfg.dynStart||step, step); // guard: ds must be >= step
    if(dir==='descending'){
      for(var x=ds;x>=step;x-=step)reps.push(x);
    }else if(dir==='pyramid'){
      for(var x=step;x<=ds;x+=step)reps.push(x);
      for(var x=ds-step;x>=step;x-=step)reps.push(x);
    }else{
      // ascending: numRds based on time cap, not fixed level
      var numRds=Math.max(4,Math.min(Math.ceil(time*0.35),14));
      for(var i=0;i<numRds;i++)reps.push(ds+i*step);
    }
  }else{
    var maxRep=maxMap[lv]||10;
    if(dir==='ascending'){for(var i=step;i<=maxRep;i+=step)reps.push(i);}
    else if(dir==='descending'){for(var i=maxRep;i>=step;i-=step)reps.push(i);}
    else{var pyrCap={beginner:9,intermediate:11,advanced:11,elite:11}[lv]||11;var pN=Math.min(pyrCap,Math.floor(maxRep/step)*2-1);if(pN%2===0)pN--;var half=Math.ceil(pN/2);for(var i=0;i<half;i++)reps.push((i+1)*step);for(var j=pN-half-1;j>=0;j--)reps.push((j+1)*step);}
  }
  // safety net: if reps ended up empty, fall back to level defaults
  if(!reps.length){
    var maxRep=maxMap[lv]||10;
    if(dir==='ascending'){for(var i=step;i<=maxRep;i+=step)reps.push(i);}
    else if(dir==='descending'){for(var i=maxRep;i>=step;i-=step)reps.push(i);}
    else{var pyrCap={beginner:9,intermediate:11,advanced:11,elite:11}[lv]||11;var pN=Math.min(pyrCap,Math.floor(maxRep/step)*2-1);if(pN%2===0)pN--;var half=Math.ceil(pN/2);for(var i=0;i<half;i++)reps.push((i+1)*step);for(var j=pN-half-1;j>=0;j--)reps.push((j+1)*step);}
  }
  var exCnt=cfg.exCnt||ri(1,2);
  var _ladderPool=getPool(lv,null,team).filter(function(e){return e.unit!=='time'&&e.unit!=='carry';});
  var chosen=pkN(_ladderPool.length?_ladderPool:getPool(lv,null,team),exCnt);
  var isAsc=dir==='ascending';
  var sepLabel=isAsc?'♾️ AMRAP — '+time+' MIN CAP':'── '+reps.length+' ROUNDS ──';
  var infoK=isAsc?'i_asc_ladder':'i_scheme';
  var infoV=isAsc?{step:step,t:time}:{scheme:reps.join(' - '),t:time};
  var items=[{kind:'sep',label:sepLabel}];
  if(isAsc){
    var ds0=reps[0]||step;
    chosen.forEach(function(ex){
      var _u=ex.unit||'reps';
      var _uLbl=_u==='time'?'s':_u==='m'?'m':'Reps';
      var ascLabel=[ds0,ds0+step,ds0+step*2,ds0+step*3].join(' - ')+' ... (+'+step+' '+_uLbl+'/Round)';
      items.push({kind:'str',ex:ex,detail:ascLabel,wt:wgt(lv,ex.cat),noPencil:true});
    });
  }else{
    chosen.forEach(function(ex){
      var _u=ex.unit||'reps';
      var _lbl;
      if(_u==='time'){_lbl=reps.map(function(r){return r+'s';}).join(' - ');}
      else if(_u==='m'||_u==='carry'){_lbl=reps.map(function(r){return r+'m';}).join(' - ');}
      else{_lbl=schemeLabel(ex,reps);}
      items.push({kind:'str',ex:ex,detail:_lbl,wt:wgt(lv,ex.cat),noPencil:true});
    });
  }
  return[{type:'Ladder',title:'Ladder',infoKey:infoK,infoVars:infoV,scoreKey:'sc_time',teamKey:team>1?'tm_ladder':null,items:items,scheme:reps,chosen:chosen,ladderCfg:cfg}];
}

function buildSchemeForRounds(dir,rounds,lv){
  var baseMap={beginner:6,intermediate:9,advanced:9,elite:12};
  var stepMap={beginner:2,intermediate:3,advanced:3,elite:5};
  var fixMap={beginner:8,intermediate:10,advanced:12,elite:15};
  var base=baseMap[lv]||9;var step=stepMap[lv]||3;var reps=[];
  if(dir==='fixed'){var f=fixMap[lv]||10;for(var i=0;i<rounds;i++)reps.push(f);}
  else if(dir==='descending'){var top=base+(rounds-1)*step;for(var i=0;i<rounds;i++)reps.push(top-i*step);}
  else if(dir==='ascending'){for(var i=0;i<rounds;i++)reps.push(base+i*step);}
  else if(dir==='pyramid'){
    var pr=rounds%2===0?rounds-1:rounds; // force odd — pyramid must have single peak
    var half=Math.ceil(pr/2);
    for(var i=0;i<half;i++)reps.push(base+i*step);
    for(var i=half-2;i>=0;i--)reps.push(base+i*step);
  }
  return reps.length?reps:getScheme(dir,lv);
}

function mkBuyInOut(time,lv,team,cfg){

  var _yLims=_exLims(chosen,lv,1); // each athlete completes full rounds solo — no ×2
  var baseReps=cfg.baseReps||_repSnap(ri(_yLims.min,_yLims.max),_yLims.min,_yLims.max);
  // Cardio with shared limits
  var _ygigCL=_cardioLimits(team,false,lv);
  var _ygigRawEx=pk(CARDIO);
  var _ygigCAmt=_ygigRawEx.unit==='Cal'?_ygigCL.calMin:_ygigRawEx.unit==='m'?_ygigCL.mtrMin:(_ygigRawEx.amount||30);
  var _ygigCEx=Object.assign({},_ygigRawEx,{amount:_ygigCAmt});

  if(fmt==='for-time'){
    var roundsEach=cfg.roundsEach||d.roundsEach;
    var timeCap=cfg.timeCap||time;
    var items=[{kind:'sep',label:'── '+roundsEach+' ROUNDS EACH ──'}];
    chosen.forEach(function(ex){items.push({kind:'str',ex:ex,detail:getDetail(ex,baseReps,null,lv,team),baseRep:baseReps,wt:wgt(lv,ex.cat)});});
    if(doCardio)items.push({kind:'cardio',ex:_ygigCEx});
    return[{type:'YGIG / Partner WOD',title:'YGIG — For Time',infoKey:'i_ygig_ft',infoVars:{r:roundsEach,cap:timeCap},scoreKey:'sc_time',teamKey:'tm_ygig_ft',teamVars:{n:eff},items:items,chosen:chosen,ygigCfg:cfg,noLongForm:true}];
  }
  // AMRAP
  var items=[];
  chosen.forEach(function(ex){items.push({kind:'str',ex:ex,detail:getDetail(ex,baseReps,null,lv,team),baseRep:baseReps,wt:wgt(lv,ex.cat)});});
  if(doCardio)items.push({kind:'cardio',ex:_ygigCEx});
  return[{type:'YGIG / Partner WOD',title:'YGIG — AMRAP',infoKey:'i_ygig',infoVars:{t:time},scoreKey:'sc_ygig',teamKey:'tm_ygig_amrap',teamVars:{n:eff},items:items,chosen:chosen,ygigCfg:cfg,noLongForm:true}];
}

function mkIntervalAmrap(time,lv,team,cfg){
  cfg=cfg||{};
  var workTime=cfg.workTime, restTime=cfg.restTime, numIntervals=cfg.numIntervals;
  var _set=[workTime!=null,restTime!=null,numIntervals!=null].filter(Boolean).length;
  var _intNMin, _intNMax;
  if(_set>=2){
    if(numIntervals==null){numIntervals=Math.floor((time+restTime)/(workTime+restTime));}
    else if(workTime==null){workTime=Math.max(1,Math.round(((time-(numIntervals-1)*(restTime||1))/numIntervals)*10)/10);}
    else if(restTime==null){restTime=numIntervals>1?Math.max(0.5,Math.round(((time-numIntervals*workTime)/(numIntervals-1))*10)/10):1;}
    workTime=workTime||3; restTime=restTime||1; numIntervals=numIntervals||3;
    _intNMin=numIntervals; _intNMax=numIntervals;
  } else {
    // ── Time-driven intervals ──
    var _itbl;
    if(time<=10)_itbl={nMin:2,nMax:3,rest:1};
    else if(time<=15)_itbl={nMin:2,nMax:3,rest:1};
    else if(time<=20)_itbl={nMin:3,nMax:4,rest:1};
    else if(time<=25)_itbl={nMin:3,nMax:4,rest:1};
    else if(time<=30)_itbl={nMin:4,nMax:5,rest:1};
    else if(time<=35)_itbl={nMin:4,nMax:5,rest:2};
    else if(time<=40)_itbl={nMin:5,nMax:6,rest:2};
    else if(time<=45)_itbl={nMin:5,nMax:6,rest:2};
    else if(time<=50)_itbl={nMin:6,nMax:7,rest:2};
    else if(time<=55)_itbl={nMin:6,nMax:7,rest:2};
    else _itbl={nMin:6,nMax:7,rest:3};
    _intNMin=_itbl.nMin; _intNMax=_itbl.nMax;
    if(!numIntervals||!restTime){
      numIntervals=numIntervals||ri(_intNMin,_intNMax);
      restTime=restTime||_itbl.rest;
    }
    workTime=workTime||Math.max(1,Math.floor((time-(numIntervals-1)*restTime)/numIntervals));
  }
  if(cfg.numIntervals){_intNMin=numIntervals;_intNMax=numIntervals;}
  var strCount=cfg.exCnt||(time<=15?2:time<=30?ri(2,3):time<=45?3:ri(3,4));
  var addCardio=cfg.withCardio===true||(cfg.withCardio===undefined&&Math.random()>0.5);
  var chosen=pkN(getPool(lv,null,team),strCount);
  var _intExLims=_exLims(chosen,lv,team);
  var _intCL=_cardioLimits(team,false,lv);
  var _intCalAmt=cfg.cardioAmt||_intCL.calMin;
  var _intCalPool=CARDIO.filter(function(c){return c.unit==='Cal';});
  var _intEx=addCardio?Object.assign({},pk(_intCalPool.length?_intCalPool:CARDIO),{amount:_intCalAmt,unit:'Cal'}):null;
  // ── Pattern selection ──
  var _intPats=['flat_2','flat_5_25','flat_5','flat_10','flat_20','desc_2','desc_10','desc_20'];
  var _intPat=cfg.pat||pk(_intPats);
  var _intIsFlat=_intPat.indexOf('flat')===0;
  var _intStep=({'flat_2':2,'flat_5_25':5,'flat_5':5,'flat_10':10,'flat_20':20,'desc_2':2,'desc_10':10,'desc_20':20})[_intPat]||5;
  var _intCap=({'flat_2':24,'flat_5_25':25,'desc_2':24})[_intPat]||_intExLims.max;
  _intCap=Math.min(_intCap,_intExLims.max);
  // ── Desc viability ──
  if(!_intIsFlat){
    var _intMaxDescEx=Math.max(1,Math.floor(_intCap/_intStep));
    if(chosen.length>_intMaxDescEx){
      if(_intMaxDescEx<2){_intPat='flat_2';_intIsFlat=true;_intStep=2;_intCap=Math.min(24,_intExLims.max);}
      else{chosen=chosen.slice(0,_intMaxDescEx);strCount=chosen.length;}
    }
  }
  var _intSnap=function(v,cap){var s=Math.round(v/_intStep)*_intStep;s=Math.max(_intExLims.min,Math.max(_intStep,s));return Math.min(cap||_intExLims.max,s);};
  // ── Initial repsArr ──
  var _intBase,_intDTop,_intRepsArr;
  if(_intIsFlat){
    _intBase=_intSnap(Math.max(_intExLims.min,_intStep),_intCap);
    _intRepsArr=chosen.map(function(){return _intBase;});
  }else{
    _intDTop=Math.min(_intCap,_intStep*chosen.length);
    _intDTop=Math.max(_intStep,Math.round(_intDTop/_intStep)*_intStep);
    _intRepsArr=chosen.map(function(e,i){return Math.max(_intExLims.min,_intDTop-i*_intStep);});
  }
  // ── Fill loop ──
  if(!cfg.baseReps&&chosen.length){
    // Exact 100% chip target: per-round est = (total*60 - rest*60*(n-1)) / n
    var _intTarget=Math.floor((time*60-restTime*60*(numIntervals-1))/numIntervals);
    var _intFullPool=getPool(lv,null,team);
    var _intPool=_intFullPool.filter(function(e){return chosen.indexOf(e)<0;});
    var _intDescGen=function(top){return chosen.map(function(e,i){return Math.max(_intExLims.min,top-i*_intStep);});};
    var _intFlatUp=function(v){return Math.min(_intCap,_intSnap(v+_intStep,_intCap));};
    var _intFlatDn=function(v){return Math.max(_intExLims.min,_intSnap(v-_intStep,_intCap));};
    // Best-state tracking: save snapshot closest to 100% (prefer over, then under)
    var _intSnapState=function(){return{repsArr:_intRepsArr.slice(),base:_intBase,dTop:_intDTop,chosen:chosen.slice(),addCardio:addCardio,intEx:_intEx?Object.assign({},_intEx):null,n:numIntervals,wt:workTime,tgt:_intTarget,est:0};};
    var _intRestoreState=function(s){_intRepsArr=s.repsArr;_intBase=s.base;_intDTop=s.dTop;chosen=s.chosen;addCardio=s.addCardio;_intEx=s.intEx;numIntervals=s.n;workTime=s.wt;_intTarget=s.tgt;_intPool=_intFullPool.filter(function(e){return chosen.indexOf(e)<0;});_intExLims=_exLims(chosen,lv,team);};
    var _intBestOver=null,_intBestUnder=null;
    var _intConverged=false;
    for(var _intLoop=0;_intLoop<20;_intLoop++){
      var _intItemCnt=chosen.length+(addCardio&&_intEx?1:0);
      var _intEst=_wodEstTime(_intRepsArr,chosen,_intEx,_intItemCnt,team);
      if(_intEst>=_intTarget*0.90&&_intEst<=_intTarget*1.00){_intConverged=true;break;}
      // Track best over/under
      if(_intEst>_intTarget){if(!_intBestOver||_intEst<_intBestOver.est){var _bs=_intSnapState();_bs.est=_intEst;_intBestOver=_bs;}}
      else{if(!_intBestUnder||_intEst>_intBestUnder.est){var _bs=_intSnapState();_bs.est=_intEst;_intBestUnder=_bs;}}
      var _intKnobs=[];
      if(_intEst>_intTarget*1.00){
        if(_intIsFlat?(_intFlatDn(_intBase)!==_intBase):((_intDTop-_intStep)>=_intStep))_intKnobs.push('repDn');
        if(addCardio&&_intEx&&!cfg.cardioAmt&&!_cardioAtMin(_intEx,_intCL))_intKnobs.push('calDn');
        if(cfg.withCardio===undefined&&addCardio&&_intEx)_intKnobs.push('cardioOff');
        if(!cfg.exCnt&&chosen.length>2)_intKnobs.push('exDn');
        if(!cfg.numIntervals&&numIntervals>_intNMin)_intKnobs.push('nDn');
      }else{
        if(_intIsFlat?(_intFlatUp(_intBase)!==_intBase):((_intDTop+_intStep)<=_intCap))_intKnobs.push('repUp');
        if(addCardio&&_intEx&&!cfg.cardioAmt&&!_cardioAtMax(_intEx,_intCL))_intKnobs.push('calUp');
        if(cfg.withCardio===undefined&&!addCardio)_intKnobs.push('cardioOn');
        if(!cfg.exCnt&&chosen.length<4&&_intPool.length)_intKnobs.push('exUp');
        if(!cfg.numIntervals&&numIntervals<_intNMax)_intKnobs.push('nUp');
      }
      if(!_intKnobs.length)break;
      var _intKnob=pk(_intKnobs);
      if(_intKnob==='repDn'){
        if(_intIsFlat){_intBase=_intFlatDn(_intBase);_intRepsArr=chosen.map(function(){return _intBase;});}
        else{_intDTop-=_intStep;_intRepsArr=_intDescGen(_intDTop);}
      }else if(_intKnob==='repUp'){
        if(_intIsFlat){_intBase=_intFlatUp(_intBase);_intRepsArr=chosen.map(function(){return _intBase;});}
        else{_intDTop+=_intStep;_intRepsArr=_intDescGen(_intDTop);}
      }else if(_intKnob==='calDn'){
        _intEx=_cardioDn(_intEx,_intCL);
      }else if(_intKnob==='calUp'){
        _intEx=_cardioUp(_intEx,_intCL);
      }else if(_intKnob==='cardioOff'){
        addCardio=false;_intEx=null;
      }else if(_intKnob==='cardioOn'){
        addCardio=true;_intEx=Object.assign({},pk(_intCalPool.length?_intCalPool:CARDIO),{amount:_intCalAmt,unit:'Cal'});
      }else if(_intKnob==='exDn'){
        chosen=chosen.slice(0,-1);_intPool=_intFullPool.filter(function(e){return chosen.indexOf(e)<0;});
        _intExLims=_exLims(chosen,lv,team);
        _intRepsArr=_intIsFlat?chosen.map(function(){return _intBase;}):_intDescGen(_intDTop);
      }else if(_intKnob==='nDn'){
        numIntervals--;
        workTime=Math.max(1,Math.floor((time-(numIntervals-1)*restTime)/numIntervals));
        _intTarget=Math.floor((time*60-restTime*60*(numIntervals-1))/numIntervals);
      }else if(_intKnob==='nUp'){
        numIntervals++;
        workTime=Math.max(1,Math.floor((time-(numIntervals-1)*restTime)/numIntervals));
        _intTarget=Math.floor((time*60-restTime*60*(numIntervals-1))/numIntervals);
      }else if(_intKnob==='exUp'){
        var _newEx=pk(_intPool);chosen.push(_newEx);_intPool=_intFullPool.filter(function(e){return chosen.indexOf(e)<0;});
        _intExLims=_exLims(chosen,lv,team);
        if(_intIsFlat){_intRepsArr.push(_intBase);}
        else{
          var _newMaxDescEx=Math.max(1,Math.floor(_intCap/_intStep));
          if(chosen.length>_newMaxDescEx){chosen.pop();_intPool=_intFullPool.filter(function(e){return chosen.indexOf(e)<0;});_intExLims=_exLims(chosen,lv,team);}
          else{_intRepsArr=_intDescGen(_intDTop);}
        }
      }
    }
    // Restore best state if loop didn't converge
    if(!_intConverged){
      var _candidates=[];
      if(_intBestOver)_candidates.push(_intBestOver);
      if(_intBestUnder)_candidates.push(_intBestUnder);
      if(_candidates.length){
        _candidates.sort(function(a,b){return Math.abs(a.est-a.tgt)-Math.abs(b.est-b.tgt);});
        _intRestoreState(_candidates[0]);
      }
    }
  }
  var baseReps=cfg.baseReps||(_intRepsArr[0]||_intExLims.min);
  var items=[];
  chosen.forEach(function(ex,i){items.push({kind:'str',ex:ex,detail:getDetail(ex,_intRepsArr[i]||baseReps,null,lv,team),baseRep:_intRepsArr[i]||baseReps,wt:wgt(lv,ex.cat)});});
  if(addCardio&&_intEx)items.push({kind:'cardio',ex:_intEx});
  return[{type:'Interval AMRAP',title:numIntervals+' × '+workTime+'-Min AMRAP',infoKey:'i_interval',infoVars:{n:numIntervals,w:workTime,rest:restTime},scoreKey:'sc_total',teamKey:team>1?'tm_simultaneous':null,items:items,intervalCfg:cfg,_numIntervals:numIntervals}];
}
function _syncGabCardio(secA,secB){
  var cA=secA.items&&secA.items.filter(function(x){return x.kind==='cardio';})[0];
  var cB=secB.items&&secB.items.filter(function(x){return x.kind==='cardio';})[0];
  if(cA&&cB&&cA.ex)cB.ex=Object.assign({},cB.ex,{amount:cA.ex.amount,unit:cA.ex.unit});
}
function mkGroupAB(time,lv,team,cfg){
  cfg=cfg||{};
  var blockTime=Math.floor(time/2);
  var secA=mkAmrap(blockTime,lv,team,cfg)[0];
  var secB=mkAmrap(blockTime,lv,team,cfg)[0];
  _syncGabCardio(secA,secB);
  secA.type='Group A';secA.title='Group A — AMRAP '+blockTime+' Min';
  secA.infoKey='i_groupA';secA.infoVars=Object.assign({},secA.infoVars,{t:blockTime});
  secA.scoreKey='sc_rounds_ab';secA.teamKey=team>1?'tm_halfA':null;

  secB.infoKey='i_groupA';secB.infoVars=Object.assign({},secB.infoVars,{t:blockTime});
  secB.groupAbCfg=cfg;
  return[secA,secB];
}

function buildDynReps(key,cfg){
  var start=cfg.dynStart;var step=cfg.dynStep||1;
  if(!start||start<1)return null;
  var sch=SCHEMES[key];if(!sch||!sch.dynamic)return null;
  var arr=[];
  if(sch.dType==='open_desc'){
    for(var x=start;x>=1;x-=step)arr.push(x);
  }else if(sch.dType==='pyr_dyn'){
    for(var x=step;x<=start;x+=step)arr.push(x);
    for(var x=start-step;x>=step;x-=step)arr.push(x);
  }
  return arr.length?arr:null;
}

// ── حساب fill ratio لأي section (نفس منطق _secChip) ──
function _secFillRatio(sec,lv,team){
  if(!sec||!sec.items)return 0;
  var strItems=sec.items.filter(function(x){return x.kind==='str'&&x.baseRep&&!x.isRest;});
  if(!strItems.length)return 0;
  var iv=sec.infoVars||{};
  var budget=(iv.t||S.time||20)*60;
  var lvl=lv||S.level||'intermediate';
  var gateExArr=[];
  sec.items.forEach(function(x){if((x.kind==='cardio'||x.kind==='station-gate')&&x.ex&&x.ex.amount)gateExArr.push(x.ex);});
  var repsArr=strItems.map(function(it){return it.baseRep;});
  var exArr=strItems.map(function(it){return it.ex;});
  var tTime=team===2?30:({beginner:45,intermediate:30,advanced:20,elite:15}[lvl]||20);
  var totalItems=strItems.length+gateExArr.length;
  var est=0;
  try{
    for(var _i=0;_i<Math.min(repsArr.length,exArr.length);_i++)est+=repsArr[_i]*getSecondsPerRep(exArr[_i],lvl,team);
    gateExArr.forEach(function(gx){if(gx.unit==='Cal')est+=gx.amount*5.5;else if(gx.unit==='m')est+=(gx.amount/10)*3.0;else if(gx.unit==='reps')est+=gx.amount*3.0;});
    est+=(totalItems-1)*tTime;
  }catch(e){return 0;}
  if((sec.type==='For Time / RFT'||sec.type==='Buy-In / Cash-Out')&&iv.r)est=est*iv.r;
  if(sec.type==='EMOM'&&iv.n){var _em=0;for(var _j=0;_j<Math.min(repsArr.length,exArr.length);_j++)_em+=repsArr[_j]*getSecondsPerRep(exArr[_j],lvl,team);gateExArr.forEach(function(gx){if(gx.unit==='Cal')_em+=gx.amount*5.5;else if(gx.unit==='m')_em+=(gx.amount/10)*3.0;else if(gx.unit==='reps')_em+=gx.amount*3.0;});est=_em;budget=(iv.n+(gateExArr.length||0))*45;}
  if(sec.type==='AMRAP'&&iv.rnd&&iv.rnd>0){var _am=0;for(var _k=0;_k<Math.min(repsArr.length,exArr.length);_k++)_am+=repsArr[_k]*getSecondsPerRep(exArr[_k],lvl,team);gateExArr.forEach(function(gx){if(gx.unit==='Cal')_am+=gx.amount*5.5;else if(gx.unit==='m')_am+=(gx.amount/10)*3.0;else if(gx.unit==='reps')_am+=gx.amount*3.0;});est=_am;budget=iv.rnd*60;}
  return budget>0?est/budget:0;
}

function generate(cfg){
  var type=pk(cfg.wodTypes);
  var userCfg=S.cfgStore&&S.cfgStore[type]?S.cfgStore[type]:undefined;
  var secs,_bestSecs=null,_bestScore=99;
  for(var _t=0;_t<10;_t++){
    secs=(GEN[type]||mkRFT)(cfg.time,cfg.level,cfg.teamSize,userCfg);
    var _fills=secs.map(function(s){return _secFillRatio(s,cfg.level,cfg.teamSize);}).filter(function(f){return f>0;});
    if(!_fills.length)break;
    var _worst=_fills.reduce(function(m,f){return Math.max(m,Math.abs(f-1));},0);
    if(_worst<_bestScore){_bestSecs=secs;_bestScore=_worst;}
    if(_fills.every(function(f){return f>=0.90&&f<=1.00;}))break;
  }
  return{type:type,sections:_bestSecs||secs,cfg:cfg};
}

function getRoundRep(detail,r){
  // Standard format: "21 - 15 - 9 reps" / "21 - 15 - 9 s"
  var m=detail.match(/^([\d][\d\s\-]+?)\s*(reps.*|Cal.*|m$|s$|kg.*)$/);
  if(m){
    var nums=m[1].split('-').map(function(s){return s.trim();}).filter(function(s){return/^\d+$/.test(s);});
    return(r<nums.length?nums[r]:nums[nums.length-1])+' '+m[2].trim();
  }
  // Embedded-unit format: "21s - 15s - 9s" or "25m - 25m - 25m"
  var m2=detail.match(/^(\d+[a-zA-Z]+)(\s*-\s*\d+[a-zA-Z]+)*$/);
  if(m2){
    var parts=detail.split(/\s*-\s*/);
    return r<parts.length?parts[r].trim():parts[parts.length-1].trim();
  }
  return detail;
}
function setRoundRep(detail,r,newVal){
  var m=detail.match(/^([\d][\d\s\-]+?)\s*(reps.*|Cal.*|m$|kg.*|s$|each side)$/);
  if(!m){var parts=detail.split(' ');var u=parts.slice(1).join(' ')||'reps';return newVal+' '+u;}
  var nums=m[1].split('-').map(function(s){return s.trim();}).filter(function(s){return/^\d+$/.test(s);});
  while(nums.length<=r)nums.push(nums[nums.length-1]||'10');
  nums[r]=String(newVal);
  return nums.join(' - ')+' '+m[2].trim();
}

function manualSwap(si,ii){
  var nEl=document.getElementById('mn-'+si+'-'+ii);
  var dEl=document.getElementById('md-'+si+'-'+ii);

  // lookup in STR pool to get unit/alts
  var found=null;for(var i=0;i<STR.length;i++){if(STR[i].name===name){found=STR[i];break;}}
  var newEx=found||{name:name,alts:[],cat:'gymnastics'};
  // rebuild detail based on unit
  var manualDetail=dEl&&dEl.value.trim();
  var newDetail;
  if(S.wod.sections[si].type==='Tabata'){
    newDetail='20s on / 10s off × 8';
  }else if(manualDetail){
    newDetail=manualDetail;
  }else{
    var oldUnit=old.ex?old.ex.unit||'reps':'reps';
    var newUnit=newEx.unit||'reps';
    var oldNum=parseInt(((old.detail||'').match(/\d+/)||['10'])[0],10)||10;
    newDetail=buildStrDetail(newEx,old,S.wod.sections[si]);
  }
  S.wod.sections[si].items[ii]=Object.assign({},old,{ex:newEx,detail:newDetail,wt:wgt(S.level,newEx.cat||'gymnastics')});

}

function swapStr(si,ii,name){
  var found=null;for(var i=0;i<STR.length;i++){if(STR[i].name===name){found=STR[i];break}}
  if(!found)found={name:name,alts:[],cat:'gymnastics'};
  var old=S.wod.sections[si].items[ii];
  var oldUnit=old.ex?old.ex.unit||'reps':'reps';
  var newUnit=found.unit||'reps';
  var oldNum=parseInt(((old.detail||'').match(/\d+/)||['10'])[0],10)||10;
  var newDetail=S.wod.sections[si].type==='Tabata'?'20s on / 10s off × 8':buildStrDetail(found,old,S.wod.sections[si]);
  S.wod.sections[si].items[ii]=Object.assign({},old,{ex:found,detail:newDetail,wt:wgt(S.level,found.cat)});
  reRenderSec(si);toast('✅ Swapped!');
}
function buildStrDetail(newEx,old,sec){
  var newUnit=newEx.unit||'reps';
  var oldUnit=old&&old.ex?old.ex.unit||'reps':'reps';
  // time/carry: fixed sensible value from pool, repeated per round — never uses rep count
  if(newUnit==='time'||newUnit==='carry'){
    // اذا القديم نفس الوحدة، احتفظ بنفس المسافة/الوقت من old.detail
    if(oldUnit===newUnit&&old&&old.detail)return old.detail;
    return(sec&&sec.scheme&&sec.scheme.length)?schemeLabel(newEx,sec.scheme,S.level,S.team):getDetail(newEx,0,null,S.level,S.team);
  }
  // reps/side: use scheme values if available — but if all scheme values equal (Sweet Spot), use old.baseRep instead
  var _schemeVaries=sec&&sec.scheme&&sec.scheme.length>1&&sec.scheme.some(function(r){return r!==sec.scheme[0];});
  if(_schemeVaries){
    return schemeLabel(newEx,sec.scheme);
  }
  // Sweet Spot or no scheme — recover rep number from old item
  var repNum=null;
  if(oldUnit==='reps'||oldUnit==='side'){
    repNum=(old&&old.baseRep)||null;
    if(!repNum){var _m=old&&old.detail&&old.detail.match(/\d+/);repNum=_m?parseInt(_m[0],10):null;}
  }
  if(!repNum)repNum=(sec&&sec.baseRep)||10;
  var _lims=_repLimits(newEx.cat,S.level,S.team);
  repNum=_repSnap(Math.max(_lims.min,Math.min(_lims.max,repNum)),_lims.min,_lims.max);
  if(newUnit==='side')return repNum+' reps each side';
  return repNum+' reps';
}
function stripCardioNum(s){return s.replace(/\s+\d+(\s*[a-z]+\.?)?$/i,'').trim();}
function tabataCardioEx(obj){
  return Object.assign({},obj,{_tabata:true});

function swapCardio(si,ii,name){
  var sec=S.wod.sections[si];
  var old=sec.items[ii];
  var cur=old.ex;
  // lookup in CARDIO pool to get correct unit/amount
  var found=null;for(var i=0;i<CARDIO.length;i++){if(CARDIO[i].name===name){found=CARDIO[i];break;}}
  var newUnit=found?found.unit:cur.unit;
  var newAmount=(found&&found.unit!==cur.unit)?found.amount:cur.amount;
  // rotate alts
  var newAlts=(cur.alts||[]).filter(function(a){return a!==name;});
  if(cur.name&&newAlts.indexOf(cur.name)<0)newAlts.unshift(cur.name);
  var newEx={name:name,amount:newAmount,unit:newUnit,alts:newAlts};
  var exObj=sec.type==='Tabata'?tabataCardioEx(newEx):newEx;
  var newItem=Object.assign({},old,{ex:exObj});
  // reset cardioAmounts if unit changed
  if(found&&found.unit!==cur.unit&&old.cardioAmounts){
    newItem.cardioAmounts=old.cardioAmounts.map(function(){return newAmount;});
  }
  sec.items[ii]=newItem;
  reRenderSec(si);toast('✅ Swapped!');
}
function regenEx(si,ii,kind){
  var old=S.wod.sections[si].items[ii];
  var sec=S.wod.sections[si];
  var isTabata=sec.type==='Tabata';
  var newEx;
  if(kind==='cardio'){
    var _cardioPool=isTabata?TABATA_CARDIO:CARDIO;
    if(isTabata){
      do{newEx=pk(_cardioPool);}while(newEx.name===(old.ex&&old.ex._raw||old.ex&&old.ex.name));
      S.wod.sections[si].items[ii]=Object.assign({},old,{ex:tabataCardioEx(newEx)});
    }else{
      var _oldUnit=old.ex&&old.ex.unit;
      var _oldName=old.ex&&old.ex.name;
      // حاول نفس الوحدة أولاً
      var _sameUnit=_cardioPool.filter(function(c){return c.unit===_oldUnit;});
      var _diffNames=_sameUnit.map(function(c){return c.name;}).filter(function(n,i,a){return a.indexOf(n)===i&&n!==_oldName;});
      if(_diffNames.length){
        // يوجد بديل بنفس الوحدة — يحافظ على المقدار والوحدة
        var _newName=pk(_diffNames);
        var _newBase=_sameUnit.filter(function(c){return c.name===_newName;})[0]||_sameUnit[0];
        newEx=Object.assign({},_newBase,{amount:(old.ex&&old.ex.amount)||_newBase.amount,unit:_oldUnit||_newBase.unit});
      }else{

      var _oldUnit=old.ex?old.ex.unit||'reps':'reps';

      var _newItem=Object.assign({},old,{ex:newEx,detail:newDetail,wt:wgt(S.level,newEx.cat)});

function copyWod(){
  var w=S.wod;var txt='🏋️ WOD: '+S.wodName+'\n'+LL[S.level]+' | '+S.time+' min'+(S.teamSize>1?' | Team of '+S.teamSize:'')+'\n\n';
  w.sections.forEach(function(s){

        txt+='── ROUND '+(r+1)+' ──\n';
        s.items.forEach(function(it){
          if(it.kind==='sep')return;
          if(it.kind==='cardio'){var _ca=it.ex.amount!=null?fmtCa(it.ex):(it.detail||'');txt+='  💨 '+it.ex.name+(_ca?' — '+_ca:'')+'\n';return;}

        });
      });
    }else{

        if(it.kind==='sep'||it.kind==='buyin'||it.kind==='scheme-header'){txt+=it.label+'\n';return;}
        if(it.kind==='station-header'){txt+='── STATION '+it.stationNum+' / '+it.stationTotal+' ──\n';return;}
        if(it.kind==='station-gate'){var _sg=it.ex.amount!=null?fmtCa(it.ex):(it.detail||'');txt+='  💨 '+it.ex.name+(_sg?' — '+_sg:'')+'\n';return;}

        txt+='  '+it.ex.name+' — '+(it.detail||'')+'\n';
      });
    }
    txt+='\n';
  });
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(function(){toast('📋 Copied!');}).catch(function(){fbCopy(txt);});}else{fbCopy(txt);}
}
function fbCopy(txt){

  document.body.appendChild(ta);ta.focus();ta.select();

}

}

function saveEditDetail(){
  var ed=editingDetail;
  // Multi-round strength (short form)
  if(ed&&ed.multiRound){
    var _item=S.wod.sections[ed.si].items[ed.ii];
    var _vals=[];
    var _allValid=true;
    for(var _ri=0;_ri<ed.roundCount;_ri++){
      var _ri_inp=document.getElementById('ed-r-'+_ri);
      if(_ri_inp){var _rv=parseInt(_ri_inp.value,10);if(!isNaN(_rv)&&_rv>=1){_vals.push(_rv);}else{_allValid=false;}}
    }
    if(!_allValid)return toast('Enter valid numbers','#ff6600');
    // Rebuild detail with new values + current unit
    var _uSuffix=strEditUnit==='m'?' m':strEditUnit==='s'?' s':' reps';
    var _detail=_vals.join(' - ')+_uSuffix;
    var _avgRep=Math.round(_vals.reduce(function(s,v){return s+v;},0)/(_vals.length||1));
    S.wod.sections[ed.si].items[ed.ii]=Object.assign({},_item,{detail:_detail,detailEdited:true,savedUnit:strEditUnit,baseRep:_avgRep});
    closeEditDetail();reRenderSec(ed.si);toast('✅ Updated!');
    return;
  }
  // Cardio scheme (all rounds at once)
  if(ed.cardioScheme){
    var _item=S.wod.sections[ed.si].items[ed.ii];
    var _newAmts=_item.cardioAmounts.map(function(_,i){
      var cinp=document.getElementById('car-r-'+i);
      return cinp?parseInt(cinp.value,10)||_item.cardioAmounts[i]:_item.cardioAmounts[i];
    });
    _item.cardioAmounts=_newAmts;
    _item.ex=Object.assign({},_item.ex,{amount:_newAmts[0],unit:cardioEditUnit});
    closeEditDetail();
    reRenderSec(ed.si);
    toast('✅ Updated!');
    return;
  }
  var inp=document.getElementById('ed-num');
  if(!inp)return;
  var val=parseInt(inp.value,10);
  if(isNaN(val)||val<1)return toast('Enter a valid number','#ff6600');
  // Cardio per-round
  if(ed.cardioRound!==undefined){
    var _item=S.wod.sections[ed.si].items[ed.ii];
    if(!_item.cardioAmounts){
      var _sec=S.wod.sections[ed.si];
      _item.cardioAmounts=new Array(_sec.scheme?_sec.scheme.length:1).fill(_item.ex.amount||0);
    }
    _item.cardioAmounts[ed.cardioRound]=val;
    _item.ex=Object.assign({},_item.ex,{amount:val}); // sync ex.amount for _secChip
    closeEditDetail();
    reRenderSec(ed.si);
    toast('✅ Updated!');
    return;
  }
  // Strength per-round (long form)
  if(ed.roundIdx!==undefined){
    var _item=S.wod.sections[ed.si].items[ed.ii];
    var _newDetail=setRoundRep(_item.detail,ed.roundIdx,val);
    var _newNums=(_newDetail.match(/\d+/g)||[]).map(Number);
    var _avgR=_newNums.length?Math.round(_newNums.reduce(function(s,v){return s+v;},0)/_newNums.length):val;
    S.wod.sections[ed.si].items[ed.ii]=Object.assign({},_item,{detail:_newDetail,detailEdited:true,savedUnit:strEditUnit,baseRep:_avgR});
    closeEditDetail();
    reRenderSec(ed.si);
    toast('✅ Updated!');
    return;
  }
  var item=S.wod.sections[ed.si].items[ed.ii];
  var unit=ed.unit;
  var setMatch=item.detail.match(/×\s*\d+\s*sets?/);
  var setSuffix=setMatch?' '+setMatch[0]:'';
  var newDetail;
  if(unit==='side') newDetail=val+' reps each side';
  else if(strEditUnit==='m') newDetail=val+' m'+setSuffix;
  else if(strEditUnit==='s') newDetail=val+' s'+setSuffix;
  else newDetail=val+(setSuffix?' reps '+setSuffix.trim():' reps');
  // If original detail was multi-round format, replicate new value for all rounds
  var _om=item.detail.match(/^([\d][\d\s\-]+?)\s*(reps|m|s)\b/);
  if(_om){
    var _op=_om[1].split('-').map(function(s){return s.trim();}).filter(function(s){return/^\d+$/.test(s);});
    if(_op.length>1){
      var _u2=strEditUnit==='m'?' m':strEditUnit==='s'?' s':' reps';
      newDetail=new Array(_op.length).fill(val).join(' - ')+_u2;
    }
  }
  // Preserve (Fixed) suffix if original had it
  if(item.detail.indexOf('(Fixed)')>=0&&newDetail.indexOf('(Fixed)')<0)newDetail=newDetail+' (Fixed)';
  S.wod.sections[ed.si].items[ed.ii]=Object.assign({},item,{detail:newDetail,detailEdited:true,baseRep:val});
  closeEditDetail();
  reRenderSec(ed.si);
  toast('✅ Updated!');
}

function saveSchemeDetailEdit(){
  var ed=editingScheme;if(!ed)return;

  var cs=newScheme.join(' - ');
  if(sec.type==='Ladder')sec.ladderCfg=Object.assign({},sec.ladderCfg||{},{customReps:newScheme});
  sec.items=sec.items.map(function(it){
    if(it.kind==='sep')return Object.assign({},it,{label:'── '+newScheme.length+' ROUNDS ──'});
    if(it.kind==='str')return Object.assign({},it,{detail:newLabel,detailEdited:true});

  });
