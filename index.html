<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CrossFit WOD Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--or:#ff6600;--og:rgba(255,102,0,.12);--gr:#00c853;--re:#ff1744;--ye:#ffd600;--bl:#448aff;--ca:#00bcd4;--cag:rgba(0,188,212,.1);--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--bdr:#333;--bdr2:#2a2a2a;--txt:#ffffff;--txt2:#aaaaaa;--txt3:#666}
body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',sans-serif;min-height:100vh;font-size:15px}
.app{max-width:480px;margin:0 auto;padding:0 0 80px}
.steps{display:flex;gap:6px;justify-content:center;margin-bottom:18px;padding-top:16px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--bdr);flex-shrink:0;transition:all .3s}
.dot.active{background:var(--or);transform:scale(1.4)}
.dot.done{background:var(--gr)}
.bk{width:100%;background:transparent;color:var(--txt2);border:1px solid var(--bdr);border-radius:12px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;margin-top:10px;min-height:48px}
.bk:active{border-color:var(--or);color:var(--or)}
.qc{background:var(--bg2);border:0.5px solid var(--bdr2);border-radius:16px;padding:20px 16px;margin:0 4px}
.ql{font-size:11px;color:var(--or);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;font-weight:700}
.qt{font-size:19px;font-weight:600;margin-bottom:4px;line-height:1.35;color:var(--txt)}
.qs{font-size:13px;color:var(--txt2);margin-bottom:18px}
.og{display:grid;gap:9px;grid-template-columns:1fr 1fr}
.ob{background:var(--bg3);border:0.5px solid var(--bdr);border-radius:12px;padding:13px 8px;color:var(--txt);cursor:pointer;text-align:center;transition:all .15s}
.ob:active,.ob.sel{border:1.5px solid var(--or);background:var(--og);color:var(--or)}
.ob.dis{opacity:.3;pointer-events:none}
.oi{font-size:22px;display:block;margin-bottom:5px}
.on{font-size:13px;font-weight:600;display:block;color:inherit}
.od{font-size:11px;color:var(--txt3);margin-top:2px;display:block}
.ob.sel .od{color:rgba(255,102,0,.6)}
.hint{font-size:12px;color:var(--txt3);text-align:center;margin-top:12px}
.nb{width:100%;background:var(--or);color:#000;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:700;cursor:pointer;margin-top:18px;text-transform:uppercase;min-height:52px}
.nb:disabled{background:var(--bdr);color:var(--txt3)}
.td{font-size:64px;font-weight:900;color:var(--or);text-align:center;line-height:1;margin:14px 0 4px}
.tu{text-align:center;font-size:12px;color:var(--txt3);margin-bottom:18px;text-transform:uppercase;letter-spacing:2px}
input[type=range]{width:100%;-webkit-appearance:none;height:5px;border-radius:3px;background:var(--bdr);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:var(--or);cursor:pointer}
.tps{display:flex;gap:6px;margin-top:14px;justify-content:center;flex-wrap:wrap}
.tp{background:var(--bg3);border:0.5px solid var(--bdr);border-radius:20px;padding:6px 14px;font-size:13px;color:var(--txt2);cursor:pointer;font-weight:500;min-height:36px}
.tp:active{border-color:var(--or);color:var(--or)}
.wh{text-align:center;margin-bottom:20px;padding:0 4px}
.wl{font-size:13px;color:var(--or);text-transform:uppercase;letter-spacing:3px;font-weight:700}
.wn{font-size:38px;font-weight:900;line-height:1;text-transform:uppercase;color:var(--txt);font-family:'Segoe UI',sans-serif}
.wm{display:flex;gap:7px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.wb{background:var(--bg2);border:0.5px solid var(--bdr);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;color:var(--txt2)}
.wb.o{border-color:var(--or);color:var(--or);background:var(--og)}
.wb.b{border-color:var(--bl);color:var(--bl)}
.ws{background:var(--bg2);border:0.5px solid var(--bdr2);border-radius:14px;padding:18px 14px;margin:0 4px 10px}
.st{font-size:11px;color:var(--or);text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:2px;font-family:'Segoe UI',sans-serif}
.stt{font-size:16px;font-weight:600;margin-bottom:12px;padding-bottom:10px;border-bottom:0.5px solid var(--bdr2);color:var(--txt);font-family:'Segoe UI',sans-serif}
.si{font-size:13px;color:var(--txt2);padding:7px 10px;background:var(--bg3);border-radius:7px;border-left:2px solid var(--or);margin-bottom:8px;line-height:1.55;font-family:'Segoe UI',sans-serif}
.si.team{border-left-color:var(--ye)}
.si.sc{border-left-color:var(--bl)}
.rsep{padding:8px 0 2px;font-size:11px;color:var(--or);text-align:center;letter-spacing:2px;font-weight:700;text-transform:uppercase}
.er{display:flex;align-items:center;gap:9px;padding:11px 0;border-bottom:0.5px solid var(--bdr2);transition:opacity .15s}
.er.drg-over{background:var(--og);border-radius:8px}
.edh{font-size:16px;color:var(--txt3);cursor:grab;flex-shrink:0;padding:0 2px;opacity:0.45;user-select:none;touch-action:none}
.edh:active{cursor:grabbing;opacity:0.9}
.er:last-child{border-bottom:none}
.en{width:26px;height:26px;border-radius:50%;background:var(--bg3);border:0.5px solid var(--or);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--or);flex-shrink:0;cursor:pointer;user-select:none;-webkit-user-select:none}
.en.reo-src{background:var(--or);color:#000;box-shadow:0 0 0 3px rgba(255,120,0,0.25)}
.en.reo-tgt{background:var(--bg2);border-style:dashed;animation:reo-pulse 1s infinite alternate}
@keyframes reo-pulse{from{border-color:var(--or);color:var(--or)}to{border-color:rgba(255,120,0,0.3);color:rgba(255,120,0,0.4)}}
.eb{flex:1;min-width:0}
.ename{font-size:14px;font-weight:500;color:var(--txt);margin-bottom:2px;font-family:'Segoe UI',sans-serif}
.edet{font-size:13px;color:var(--or);font-weight:700;font-family:'Segoe UI',sans-serif}
.ea{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.esb{background:var(--bg3);border:0.5px solid var(--bdr);border-radius:7px;padding:5px 9px;font-size:11px;color:var(--txt2);cursor:pointer;font-weight:600;min-height:30px;text-align:center}
.esb:active{border-color:var(--gr);color:var(--gr)}
.esb.re{color:var(--re);border-color:rgba(255,23,68,.3)}
.cb{display:flex;align-items:center;gap:9px;padding:9px 10px;margin:5px 0;background:var(--cag);border:0.5px solid rgba(0,188,212,.2);border-radius:10px}
.ci{font-size:16px;flex-shrink:0}
.cbb{flex:1;min-width:0}
.cn{font-size:14px;font-weight:700;color:var(--ca)}
.cd{font-size:11px;color:rgba(0,188,212,.7);margin-top:1px}
.ct{font-size:11px;background:rgba(0,188,212,.12);color:var(--ca);padding:2px 7px;border-radius:7px;font-weight:700;flex-shrink:0}
.csb{background:none;border:0.5px solid rgba(0,188,212,.3);border-radius:6px;padding:4px 8px;font-size:11px;color:var(--ca);cursor:pointer;font-weight:600;flex-shrink:0;min-height:28px}
.sp{background:var(--bg3);border:0.5px solid rgba(0,200,83,.2);border-radius:10px;padding:11px;margin-top:3px;display:none}
.sp.open{display:block}
.sp.cp{border-color:rgba(0,188,212,.2)}
.sh{font-size:11px;color:var(--gr);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:7px}
.sh.ch{color:var(--ca)}
.so{display:flex;flex-direction:column;gap:5px}
.soi{background:var(--bg2);border:0.5px solid var(--bdr);border-radius:7px;padding:8px 11px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;min-height:40px}
.soi:active{border-color:var(--gr)}
.soi.co:active{border-color:var(--ca)}
.soi .sn{font-size:13px;font-weight:500;color:var(--txt)}
.soi .stag{font-size:12px;color:var(--txt3)}
.gn{width:100%;background:rgba(255,23,68,.06);border:0.5px dashed rgba(255,23,68,.3);border-radius:7px;padding:8px;font-size:12px;color:var(--re);cursor:pointer;font-weight:700;margin-top:7px;min-height:38px}
.ar{display:flex;gap:8px;margin:16px 4px 0;flex-wrap:wrap}
.ab{flex:1;border:none;border-radius:11px;padding:13px 6px;font-size:12px;font-weight:700;cursor:pointer;text-transform:uppercase;min-height:48px;min-width:0}
.ab.pri{background:var(--or);color:#000}
.ab.dan{background:rgba(255,23,68,.07);color:var(--re);border:0.5px solid rgba(255,23,68,.2)}
.loading{text-align:center;padding:60px 20px}
.spinner{width:48px;height:48px;border:3px solid var(--bdr);border-top-color:var(--or);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.lt{font-size:14px;color:var(--txt2);font-weight:600}
.tst{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--gr);color:#000;padding:10px 20px;border-radius:30px;font-weight:700;font-size:13px;transition:transform .3s;z-index:999;white-space:nowrap;pointer-events:none}
.tst.show{transform:translateX(-50%) translateY(0)}
@keyframes su{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.ani{animation:su .25s ease}
@media(max-width:380px){.wn{font-size:30px}.ob{padding:10px 6px}.on{font-size:12px}}
body.light{--bg:#f5f5f5;--bg2:#ffffff;--bg3:#eeeeee;--bdr:#d8d8d8;--bdr2:#e2e2e2;--txt:#111111;--txt2:#555555;--txt3:#999999;--og:rgba(255,102,0,.10);--cag:rgba(0,150,180,.08);--ye:#b8860b}
body.light input{color:#111 !important}
body.light .nb{color:#000}
body.light .spinner{border-color:#ddd;border-top-color:var(--or)}
body[dir=rtl] .cfg-btn{right:auto;left:14px}
body[dir=rtl] .wh{text-align:center;direction:ltr}
body[dir=rtl] .st{text-align:left;direction:ltr}
body[dir=rtl] .stt{text-align:left;direction:ltr}
body[dir=rtl] .er{direction:ltr}
body[dir=rtl] .cb{direction:ltr}
body[dir=rtl] .rsep{direction:ltr}
body[dir=rtl] .soi{direction:ltr}
body[dir=rtl] .cfg-row{direction:ltr}
body[dir=rtl] .ar{direction:ltr}
body[dir=rtl] .ql,body[dir=rtl] .wl,body[dir=rtl] .nb,body[dir=rtl] .ab,body[dir=rtl] .sh,body[dir=rtl] .tu{letter-spacing:0}
body[dir=rtl] .nb,body[dir=rtl] .bk,body[dir=rtl] .ab,body[dir=rtl] .ql,body[dir=rtl] .qt,body[dir=rtl] .qs,body[dir=rtl] .wl,body[dir=rtl] .on,body[dir=rtl] .od,body[dir=rtl] .tu,body[dir=rtl] .sh,body[dir=rtl] .hint,body[dir=rtl] .lt,body[dir=rtl] button,body[dir=rtl] .tnc-title,body[dir=rtl] .tnc-date,body[dir=rtl] .tnc-sec,body[dir=rtl] .tnc-p{font-family:'Almarai',sans-serif}
body[dir=rtl]{line-height:1.5}
.cfg-btn{position:fixed;top:14px;right:14px;z-index:150;background:var(--bg2);border:0.5px solid var(--bdr);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:19px;box-shadow:none}
.cfg-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6)}
.cfg-box{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg2);border-radius:18px 18px 0 0;padding:22px 20px 40px}
.cfg-title{font-size:15px;font-weight:700;color:var(--txt);margin-bottom:18px;text-align:center}
.cfg-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:0.5px solid var(--bdr2)}
.cfg-row:last-child{border-bottom:none}
.cfg-lbl{font-size:14px;color:var(--txt2);font-weight:600}
.cfg-seg{display:flex;background:var(--bg3);border-radius:8px;padding:2px;gap:2px}
.cfg-seg button{background:none;border:none;border-radius:6px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;color:var(--txt2)}
.cfg-seg button.on{background:var(--or);color:#fff}
.tnc-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;overflow-y:auto}
.tnc-box{max-width:480px;margin:0 auto;background:var(--bg2);min-height:100vh;padding:24px 18px 48px}
.tnc-title{font-size:18px;font-weight:800;color:var(--or);margin-bottom:4px}
.tnc-date{font-size:12px;color:var(--txt3);margin-bottom:20px}
.tnc-sec{font-size:14px;font-weight:700;color:var(--txt);margin:18px 0 6px}
.tnc-p{font-size:13px;color:var(--txt2);line-height:1.75;text-align:justify}
.wdi-btn{background:none;border:none;cursor:pointer;font-size:15px;padding:0 0 0 6px;line-height:1;opacity:0.75;transition:opacity .15s;flex-shrink:0}
.wdi-btn:hover{opacity:1}
.wdi-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;animation:fdi .15s ease}
@keyframes fdi{from{opacity:0}to{opacity:1}}
.wdi-modal{background:var(--bg);border-radius:16px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto;padding:24px 22px 22px;position:relative;box-shadow:0 12px 40px rgba(0,0,0,0.35)}
.wdi-close{position:absolute;top:12px;right:12px;background:none;border:none;cursor:pointer;font-size:18px;color:var(--txt3);line-height:1;padding:4px}
.wdi-type{font-size:11px;color:var(--or);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;font-family:'Segoe UI',sans-serif;direction:ltr;text-align:left}
.wdi-txt{font-size:13px;line-height:1.8;color:var(--txt);margin:0;text-align:justify}
.wdi-txt[dir=rtl]{font-family:'Almarai',sans-serif}
body[dir=rtl] .wdi-close{right:auto;left:12px}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="tst" id="tst"></div>
<button class="cfg-btn" onclick="openCfg()">⚙️</button>
<div class="cfg-overlay" id="cfg-overlay" onclick="closeCfg()">
  <div class="cfg-box" onclick="event.stopPropagation()">
    <div class="cfg-title" id="cfg-title">Settings</div>
    <div class="cfg-row">
      <span class="cfg-lbl" id="cfg-lang-lbl">Language</span>
      <div class="cfg-seg">
        <button id="btn-en" class="on" onclick="setLang('en')">EN</button>
        <button id="btn-ar" onclick="setLang('ar')">AR</button>
      </div>
    </div>
    <div class="cfg-row">
      <span class="cfg-lbl" id="cfg-theme-lbl">Theme</span>
      <div class="cfg-seg">
        <button id="btn-dark" class="on" onclick="setTheme('dark')">🌑 Dark</button>
        <button id="btn-light" onclick="setTheme('light')">☀️ Light</button>
      </div>
    </div>
  </div>
</div>

<div class="tnc-overlay" id="tnc-overlay"></div>
<div id="edit-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200" onclick="closeEditDetail()">
  <div id="edit-sheet" style="position:absolute;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:480px;background:var(--bg2);border:0.5px solid var(--bdr2);border-radius:18px 18px 0 0;padding:18px 18px 32px;transition:transform .25s ease;direction:ltr" onclick="event.stopPropagation()"></div>
</div>

function ti(k,v){var s=t(k);if(v)Object.keys(v).forEach(function(p){s=s.replace(new RegExp('{'+p+'}','g'),v[p]);});return s;}
function openCfg(){document.getElementById('cfg-overlay').style.display='block';}
function closeCfg(){document.getElementById('cfg-overlay').style.display='none';}
function setLang(l){
  CFG.lang=l;
  localStorage.setItem('wod_cfg',JSON.stringify(CFG));
  document.getElementById('btn-en').classList.toggle('on',l==='en');
  document.getElementById('btn-ar').classList.toggle('on',l==='ar');
  document.getElementById('cfg-title').textContent=t('s');
  document.getElementById('cfg-lang-lbl').textContent=t('language');
  document.getElementById('cfg-theme-lbl').textContent=t('theme');
  document.getElementById('btn-dark').textContent=(l==='ar'?'🌑 داكن':'🌑 Dark');
  document.getElementById('btn-light').textContent=(l==='ar'?'☀️ فاتح':'☀️ Light');
  document.body.dir=l==='ar'?'rtl':'ltr';
  closeCfg();
  if(document.getElementById('tnc-overlay').style.display==='block'){renderTnC();return;}
  if(document.getElementById('gate-email')||document.getElementById('gate-inp')){showGate();}
  else if(S.step===4&&S.wod){renderWod();}
  else{render();}
}
function setTheme(th){
  CFG.theme=th;
  localStorage.setItem('wod_cfg',JSON.stringify(CFG));
  document.body.classList.toggle('light',th==='light');
  document.getElementById('btn-dark').classList.toggle('on',th==='dark');
  document.getElementById('btn-light').classList.toggle('on',th==='light');
}
function loadCfg(){
  try{var c=JSON.parse(localStorage.getItem('wod_cfg')||'{}');
    if(c.lang)CFG.lang=c.lang;
    if(c.theme)CFG.theme=c.theme;
  }catch(e){}
  document.body.classList.toggle('light',CFG.theme==='light');
  document.body.dir=CFG.lang==='ar'?'rtl':'ltr';
  document.getElementById('btn-en').classList.toggle('on',CFG.lang==='en');
  document.getElementById('btn-ar').classList.toggle('on',CFG.lang==='ar');

function buildSchemeForRounds(dir,rounds,lv){
  var baseMap={beginner:6,intermediate:9,advanced:9,elite:12};
  var stepMap={beginner:2,intermediate:3,advanced:3,elite:5};
  var fixMap={beginner:8,intermediate:10,advanced:12,elite:15};
  var base=baseMap[lv]||9;var step=stepMap[lv]||3;var reps=[];
  if(dir==='fixed'){var f=fixMap[lv]||10;for(var i=0;i<rounds;i++)reps.push(f);}
  else if(dir==='descending'){var top=base+(rounds-1)*step;for(var i=0;i<rounds;i++)reps.push(top-i*step);}
  else if(dir==='ascending'){for(var i=0;i<rounds;i++)reps.push(base+i*step);}
  else if(dir==='pyramid'){
    var pr=rounds%2===0?rounds-1:rounds; // force odd — pyramid must have single peak
    var half=Math.ceil(pr/2);
    for(var i=0;i<half;i++)reps.push(base+i*step);
    for(var i=half-2;i>=0;i--)reps.push(base+i*step);
  }
  return reps.length?reps:getScheme(dir,lv);
}

}
function mkYGIG(time,lv,team,cfg){
  cfg=cfg||{};
  var eff=Math.max(team,2);
  var fmt=cfg.format||(Math.random()>0.5?'amrap':'for-time');
  // For-Time: roundsEach/timeCap خاصية YGIG فقط — حسب الوقت
  var _ftExCnt=time<=30?{mMin:2,mMax:3}:{mMin:3,mMax:4};
  var _ygigRftRoundsMap={10:2,15:2,20:3,25:3,30:3,35:4,40:4,45:4,50:4,55:4,60:4};
  var _ftDef={roundsEach:_ygigRftRoundsMap[time]||3};
  if(fmt==='for-time'){
    var roundsEach=cfg.roundsEach||_ftDef.roundsEach;
    var _exCnt=cfg.exCnt||ri(_ftExCnt.mMin,_ftExCnt.mMax);
    // mkRFT يستهدف time/(roundsEach*2) لكل جولة (كلا الشريكين يتناوبان)
    var _rftSec=mkRFT(time,lv,team,{exCnt:_exCnt,baseReps:cfg.baseReps,withCardio:cfg.withCardio,rounds:roundsEach*2,noTeamSplit:true})[0];
    var timeCap;
    if(cfg.timeCap){
      timeCap=cfg.timeCap;
    } else {
      // حساب est لجولة واحدة مباشرة من الأيتمز (solo, noTeamSplit)
      var _orItems=_rftSec.items.filter(function(x){return x.kind==='str'&&x.baseRep&&!x.isRest;});
      var _orCardio=_rftSec.items.filter(function(x){return x.kind==='cardio'&&x.ex&&x.ex.amount;}).map(function(x){return x.ex;});
      var _orTTime=30; // YGIG دايماً team=2 → tTime=30s (يطابق _secFill)
      var _ors=0;
      _orItems.forEach(function(it){_ors+=it.baseRep*getSecondsPerRep(it.ex,lv,1,false);});
      _orCardio.forEach(function(gx){_ors+=_cardioSecEst(gx,lv,1,false);});
      if(_orItems.length+_orCardio.length>1)_ors+=(_orItems.length+_orCardio.length-1)*_orTTime;
      if(!_ors)_ors=60;
      // timeCap = وقت الـ WOD الكلي اللازم لكلا الشريكين × roundsEach
      timeCap=Math.ceil(_ors*roundsEach*2/(0.95*60));
      if(!cfg.roundsEach){
        for(var _t=0;_t<10&&timeCap>time&&roundsEach>2;_t++){roundsEach--;timeCap=Math.ceil(_ors*roundsEach*2/(0.95*60));}
      }
      timeCap=Math.min(time,Math.max(1,timeCap));
    }
    _rftSec.type='YGIG / Partner WOD';_rftSec.title='YGIG - '+(roundsEach*2)+' Rounds For Time';
    _rftSec.infoKey='i_ygig_ft';_rftSec.infoVars={r:roundsEach,cap:timeCap};
    _rftSec.scoreKey='sc_time';_rftSec.teamKey='tm_ygig_ft';_rftSec.teamVars={n:eff};
    _rftSec.noLongForm=true;_rftSec.ygigCfg=cfg;
    if(_rftSec.items){var _sep=_rftSec.items.find(function(x){return x.kind==='sep';});if(_sep)_sep.label='── '+(roundsEach*2)+' Rounds — ('+roundsEach+' each, alternating) ──';}
    return[_rftSec];
  }
  // AMRAP
  // YGIG AMRAP: حساب وقت الجولة من جدول السولو
  var _ygigSoloTgt=_amrapTgtMap[time]||210;
  var _ygigSoloRnds=Math.floor(time/(_ygigSoloTgt/60));
  var _ygigEvenRnds=Math.ceil(_ygigSoloRnds/2)*2;
  if(_ygigEvenRnds<2)_ygigEvenRnds=2;
  var _ygigAmrapTgt=Math.round(time/_ygigEvenRnds*60); // ثواني
  // exCnt: solo AMRAP table (2-3 for ≤30, 3-4 for ≤60, 4 for >60)
  var _ygigExCnt=cfg.exCnt||ri(time<=30?2:3, time<=30?3:4);
  var _amrSec=mkAmrap(time,lv,team,{exCnt:_ygigExCnt,baseReps:cfg.baseReps,withCardio:cfg.withCardio,target:_ygigAmrapTgt,noTeamSplit:true})[0];
  var _amrRnd=(_amrSec.infoVars||{}).rnd;
  _amrSec.type='YGIG / Partner WOD';_amrSec.title='YGIG — AMRAP '+time+' Min';
  _amrSec.infoKey='i_amrap';_amrSec.infoVars={t:time,rnd:_amrRnd};
  _amrSec.scoreKey='sc_ygig';_amrSec.teamKey='tm_ygig_amrap';_amrSec.teamVars={n:eff};
  _amrSec.noLongForm=true;_amrSec.ygigCfg=cfg;
  if(_amrSec.items){_amrSec.items.unshift({kind:'sep',label:'── Alternating Full Rounds ──'});}
  return[_amrSec];
}

// ── حساب fill ratio لأي section (نفس منطق _secChip) ──
function _secFillRatio(sec,lv,team){
  if(!sec||!sec.items)return 0;
  var strItems=sec.items.filter(function(x){return x.kind==='str'&&x.baseRep&&!x.isRest;});
  if(!strItems.length)return 0;
  var iv=sec.infoVars||{};
  var _isYgigFT=sec.type==='YGIG / Partner WOD'&&iv.r&&iv.cap;
  var budget=_isYgigFT?(iv.cap*60):(iv.t||S.time||20)*60;
  var lvl=lv||S.level||'intermediate';
  var _splt=sec.type!=='YGIG / Partner WOD'&&sec.type!=='EMOM'&&sec.type!=='Tabata'&&sec.type!=='Group A'&&sec.type!=='Group B';
  var gateExArr=[];
  sec.items.forEach(function(x){if((x.kind==='cardio'||x.kind==='station-gate')&&x.ex&&x.ex.amount)gateExArr.push(x.ex);});
  var repsArr=strItems.map(function(it){return it.baseRep;});
  var exArr=strItems.map(function(it){return it.ex;});
  var tTime=team===2?30:({beginner:45,intermediate:30,advanced:20,elite:15}[lvl]||20);
  var totalItems=strItems.length+gateExArr.length;
  var est=0;
  try{
    for(var _i=0;_i<Math.min(repsArr.length,exArr.length);_i++)est+=repsArr[_i]*getSecondsPerRep(exArr[_i],lvl,team,_splt);
    gateExArr.forEach(function(gx){est+=_cardioSecEst(gx,lvl,team,_splt);});
    est+=(totalItems-1)*tTime;
  }catch(e){return 0;}
  if(_isYgigFT&&iv.r){est=est*iv.r*2;}else if((sec.type==='For Time / RFT'||sec.type==='Buy-In / Cash-Out')&&iv.r){est=est*iv.r;}
  if(sec.type==='EMOM'&&iv.n){var _em=0;for(var _j=0;_j<Math.min(repsArr.length,exArr.length);_j++)_em+=repsArr[_j]*getSecondsPerRep(exArr[_j],lvl,team,false);gateExArr.forEach(function(gx){_em+=_cardioSecEst(gx,lvl,team,false);});est=_em;budget=(iv.n+(gateExArr.length||0))*45;}
  if((sec.type==='AMRAP'||sec.type==='YGIG / Partner WOD')&&iv.rnd&&iv.rnd>0){var _am=0;for(var _k=0;_k<Math.min(repsArr.length,exArr.length);_k++)_am+=repsArr[_k]*getSecondsPerRep(exArr[_k],lvl,team,true);gateExArr.forEach(function(gx){_am+=_cardioSecEst(gx,lvl,team,true);});est=_am;budget=iv.rnd*60;}  if((sec.type==='Group A'||sec.type==='Group B')&&iv.rnd&&iv.rnd>0){var _gab=0;for(var _kg=0;_kg<Math.min(repsArr.length,exArr.length);_kg++)_gab+=repsArr[_kg]*getSecondsPerRep(exArr[_kg],lvl,team,false);gateExArr.forEach(function(gx){_gab+=_cardioSecEst(gx,lvl,team,false);});est=_gab;budget=iv.rnd*60;}
  return budget>0?est/budget:0;
}
// ── helper: نفس retry loop الـ generate لكن لسكشن واحد ──
function _regenBest(mkFn,time,lv,team,cfg){
  var best=null,bestScore=99;
  for(var _t=0;_t<10;_t++){
    var secs=mkFn(time,lv,team,cfg);
    if(!secs||!secs[0])break;
    var fills=secs.map(function(s){return _secFillRatio(s,lv,team);}).filter(function(f){return f>0;});
    if(!fills.length){best=secs;break;}
    var worst=fills.reduce(function(m,f){return Math.max(m,Math.abs(f-1));},0);
    if(worst<bestScore){best=secs;bestScore=worst;}
    if(fills.every(function(f){return f>=0.95&&f<=1.00;}))break;
  }
  return best;
}
// ── generate: retry حتى 10 مرات لو النتيجة برا [80%,110%] ──
function generate(cfg){
  var type=pk(cfg.wodTypes);
  var userCfg=S.cfgStore&&S.cfgStore[type]?S.cfgStore[type]:undefined;
  // YGIG: حدد الفورمات والكارديو مرة واحدة قبل اللوب
  if(type==='ygig'){
    var _randFmt=Math.random()>0.5?'amrap':'for-time';
    var _genFmt=(userCfg&&userCfg.format)||_randFmt;
    var _fmtKey=_genFmt==='for-time'?'ft':'amrap';
    var _subCfg=(userCfg&&userCfg[_fmtKey])||{};
    var _randCardio=Math.random()>0.5;
    userCfg=Object.assign({format:_genFmt},_subCfg);
    if(_subCfg.withCardio===undefined)userCfg.withCardio=_randCardio;
  }
  var secs,_bestSecs=null,_bestScore=99;
  for(var _t=0;_t<10;_t++){
    secs=(GEN[type]||mkRFT)(cfg.time,cfg.level,cfg.teamSize,userCfg);
    var _fills=secs.map(function(s){return _secFillRatio(s,cfg.level,cfg.teamSize);}).filter(function(f){return f>0;});
    if(!_fills.length)break;
    var _worst=_fills.reduce(function(m,f){return Math.max(m,Math.abs(f-1));},0);
    if(_worst<_bestScore){_bestSecs=secs;_bestScore=_worst;}
    if(_fills.every(function(f){return f>=0.95&&f<=1.00;}))break;
  }
  var _finalSecs=_bestSecs||secs;
  // YGIG: ygigCfg يحتوي فقط اختيارات المستخدم + الفورمات للـ UI (بدون عشوائي)
  if(type==='ygig'&&_finalSecs&&_finalSecs[0]){
    var _userOnly=Object.assign({},S.cfgStore&&S.cfgStore['ygig']||{});
      _finalSecs[0].ygigCfg=Object.assign({},_userOnly);
  }
  return{type:type,sections:_finalSecs,cfg:cfg};
}

function getRoundRep(detail,r){

  if(m){
    var nums=m[1].split('-').map(function(s){return s.trim();}).filter(function(s){return/^\d+$/.test(s);});
    return(r<nums.length?nums[r]:nums[nums.length-1])+' '+m[2].trim();
  }
  // Embedded-unit format: "21s - 15s - 9s" or "25m - 25m - 25m"
  var m2=detail.match(/^(\d+[a-zA-Z]+)(\s*-\s*\d+[a-zA-Z]+)*$/);
  if(m2){
    var parts=detail.split(/\s*-\s*/);
    return r<parts.length?parts[r].trim():parts[parts.length-1].trim();
  }
  return detail;
}
function setRoundRep(detail,r,newVal){

  if(!m){var parts=detail.split(' ');var u=parts.slice(1).join(' ')||'reps';return newVal+' '+u;}

  while(nums.length<=r)nums.push(nums[nums.length-1]||'10');

function buildStrDetail(newEx,old,sec){
  var newUnit=newEx.unit||'reps';

  if(newUnit==='time'||newUnit==='carry'){
    // اذا القديم نفس الوحدة، احتفظ بنفس المسافة/الوقت من old.detail

    var _sMax=_rMax<24?Math.round(_rMax/2)*2:Math.round(_rMax/10)*10;
    _lims={min:_sMin,max:Math.max(_sMin,_sMax)};
  }
  var _schemeVaries=sec&&sec.scheme&&sec.scheme.length>1&&sec.scheme.some(function(r){return r!==sec.scheme[0];});
  if(_schemeVaries){
    // احتفظ بالرب اللي عدّلها المستخدم (repsPerRound) أو السكيم الأصلي، مع كبس للحد الجديد فقط
    var _srcScheme=old&&old.repsPerRound&&old.repsPerRound.length?old.repsPerRound:sec.scheme;
    // لو التمرين الجديد بوحدة مختلفة (m/carry) — رجّع نفس رقم الرب مو تغييره
    if(newUnit==='m'||newUnit==='carry'||newUnit==='time')return schemeLabel(newEx,_srcScheme.map(function(r){return Math.max(_lims.min,Math.min(_lims.max,r));}));

  }
  // Per-round user-edited reps: preserve from repsPerRound or from detail string (e.g. "20 - 20 - 10 - 20 - 20 reps")
  var _oldRpr=old&&old.repsPerRound&&old.repsPerRound.length>1?old.repsPerRound:null;
  if(!_oldRpr&&old&&old.detail){var _drm=old.detail.match(/^([\d][\d\s\-]+?)\s*(reps|m|s)\b/);if(_drm){var _drp=_drm[1].split('-').map(function(s){return parseInt(s.trim(),10);}).filter(function(v){return!isNaN(v);});if(_drp.length>1)_oldRpr=_drp;}}
  if(_oldRpr&&newUnit!=='time'&&newUnit!=='carry'){return schemeLabel(newEx,_oldRpr.map(function(r){return Math.max(_lims.min,Math.min(_lims.max,r));}));}
  // Sweet Spot or no scheme — recover rep number from old item
  var repNum=(old&&old.baseRep)||null;
  if(!repNum&&(oldUnit==='reps'||oldUnit==='side')){var _m=old&&old.detail&&old.detail.match(/\d+/);repNum=_m?parseInt(_m[0],10):null;}
  if(!repNum)repNum=(sec&&sec.baseRep)||10;
  // كبس للحد فقط — احتفظ بالرب الأصلي ما لم يتجاوز الماكس

// ─── TABATA TIMER ────────────────────────────────────────────────────────────
var _tabTimer={iv:null,seq:[],idx:0,rem:0,paused:false};
function _tabBeep(freq,dur,vol){
  try{var ctx=new(window.AudioContext||window.webkitAudioContext)();var o=ctx.createOscillator();var g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=freq;g.gain.setValueAtTime(vol||0.4,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);o.start();o.stop(ctx.currentTime+dur);}catch(e){}
}
function _tabBeepWork(){_tabBeep(880,0.12);setTimeout(function(){_tabBeep(880,0.12);},130);}
function _tabBeepRest(){_tabBeep(440,0.3);}
function _tabBeepDone(){_tabBeep(660,0.15);setTimeout(function(){_tabBeep(880,0.15);},200);setTimeout(function(){_tabBeep(1100,0.4);},400);}
function _tabBeepCountdown(){_tabBeep(660,0.08);}

function showTabataTimer(si){
  var sec=S.wod.sections[si];
  var cfg=sec.tabataCfg||{};
  var _mode=cfg.mode||cfg._genMode||'single';
  var movs=sec.items.filter(function(it){return it.kind==='str'||it.kind==='cardio';});
  var seq=[];
  // GET READY
  seq.push({phase:'ready',dur:10,label:'GET READY',sub:'',mov:'',intv:0,tot:0});
  if(_mode==='single'){
    var nm=movs[0]?(movs[0].ex&&movs[0].ex.name)||'':'' ;
    for(var i=1;i<=8;i++){
      seq.push({phase:'work',dur:20,label:'WORK',sub:'Interval '+i+' / 8',mov:nm,intv:i,tot:8});
      seq.push({phase:'rest',dur:10,label:'REST',sub:'Interval '+i+' / 8',mov:nm,intv:i,tot:8});
    }
  }else if(_mode==='multi'){
    var n=movs.length;
    for(var m=0;m<n;m++){
      var nm=movs[m]?(movs[m].ex&&movs[m].ex.name)||'':'';
      var nmNext=m+1<n?(movs[m+1].ex&&movs[m+1].ex.name)||'':'';
      for(var i=1;i<=8;i++){
        seq.push({phase:'work',dur:20,label:'WORK',sub:'Interval '+i+' / 8',mov:nm,intv:i,tot:8});
        seq.push({phase:'rest',dur:10,label:'REST',sub:'Interval '+i+' / 8',mov:nm,intv:i,tot:8});
      }
      if(m<n-1)seq.push({phase:'between',dur:60,label:'REST',sub:'1 MIN — Next: '+nmNext,mov:'',intv:0,tot:0});
    }
  }else{ // alternating
    var n=movs.length;
    for(var r=1;r<=8;r++){
      for(var m=0;m<n;m++){
        var nm=movs[m]?(movs[m].ex&&movs[m].ex.name)||'':'';
        seq.push({phase:'work',dur:20,label:'WORK',sub:'Round '+r+' / 8 · '+( m+1)+'/'+n,mov:nm,intv:r,tot:8});
        seq.push({phase:'rest',dur:10,label:'REST',sub:'Round '+r+' / 8 · '+(m+1)+'/'+n,mov:nm,intv:r,tot:8});
      }
    }
  }
  seq.push({phase:'done',dur:0,label:'DONE!',sub:'',mov:'',intv:0,tot:0});
  _tabTimer.seq=seq;_tabTimer.idx=0;_tabTimer.rem=seq[0].dur;_tabTimer.paused=false;_tabTimer.si=si;
  if(_tabTimer.iv)clearInterval(_tabTimer.iv);

  // Build overlay
  var ov=document.createElement('div');
  ov.id='tab-timer-ov';
  ov.style.cssText='position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;font-family:inherit;overflow:hidden;';
  document.body.appendChild(ov);
  _tabTimerRender();

  _tabTimer.iv=setInterval(function(){
    if(_tabTimer.paused)return;
    var cur=_tabTimer.seq[_tabTimer.idx];
    if(cur.phase==='done'){_tabTimerStop();return;}
    _tabTimer.rem--;
    // countdown beeps at 3,2,1
    if(_tabTimer.rem<=3&&_tabTimer.rem>0)_tabBeepCountdown();
    if(_tabTimer.rem<=0){
      _tabTimer.idx++;
      if(_tabTimer.idx>=_tabTimer.seq.length){_tabTimerStop();return;}
      var next=_tabTimer.seq[_tabTimer.idx];
      _tabTimer.rem=next.dur;
      if(next.phase==='done'){_tabBeepDone();}
      else if(next.phase==='work')_tabBeepWork();
      else _tabBeepRest();
    }
    _tabTimerRender();
  },1000);
}
function _renderTimerExList(si){
  if(si===undefined||si===null||!S.wod)return'';
  var sec=S.wod.sections[si];if(!sec||!sec.items)return'';
  var exItems=sec.items.filter(function(it){return it.kind==='str'||it.kind==='cardio';});
  if(!exItems.length)return'';
  // Title
  var titleHtml=sec.title?'<div style="font-size:17px;font-weight:800;color:#fff;text-align:center;margin-bottom:8px;letter-spacing:0.2px">'+sec.title+'</div>':'';
  // First sep label (e.g. "── 4 ROUNDS ──")
  var sepLabel='';
  for(var _si=0;_si<sec.items.length;_si++){if(sec.items[_si].kind==='sep'&&sec.items[_si].label){sepLabel=sec.items[_si].label;break;}}
  var sepHtml=sepLabel?'<div style="font-size:11px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,0.28);text-align:center;margin-bottom:14px">'+sepLabel+'</div>':'<div style="margin-bottom:12px"></div>';

    var nm=(it.ex&&it.ex.name)||'';

    var minPfx=it.emomMin?'<span style="color:rgba(255,255,255,0.32);font-size:'+fsSub+'px;font-weight:700;margin-right:7px">MIN '+it.emomMin+'</span>':'';
    return'<div style="text-align:center;padding:'+py+'px 0;'+(i<exItems.length-1?'border-bottom:0.5px solid rgba(255,255,255,0.09)':'')+';">'
      +minPfx
      +'<span style="color:rgba(255,255,255,0.92);font-size:'+fs+'px;font-weight:700">'+nm+'</span>'
      +(dt?'<span style="color:rgba(255,255,255,0.48);font-size:'+fsSub+'px;font-weight:500">  '+dt+'</span>':'')
      +'</div>';
  }).join('');
  return'<div style="flex:1;min-height:0;overflow-y:'+(needsScroll?'auto':'hidden')+';background:rgba(0,0,0,0.35);border-top:1px solid rgba(255,255,255,0.1)">'
    +'<div style="max-width:480px;margin:0 auto;padding:12px 24px 16px;text-align:center;width:100%;box-sizing:border-box">'
    +titleHtml+sepHtml+rows
    +'</div></div>';
}

   +(ph!=='done'

     :'<div style="font-size:64px;margin-bottom:48px">🎉</div>')

   +'<button onclick="_tabTimerStop()" style="background:rgba(255,60,60,0.2);border:1px solid rgba(255,60,60,0.4);border-radius:12px;padding:12px 28px;font-size:15px;font-weight:700;color:#ff6060;cursor:pointer">⏹ Stop</button>'

function _tabTimerToggle(){_tabTimer.paused=!_tabTimer.paused;_tabTimerRender();}
function _tabTimerStop(){if(_tabTimer.iv)clearInterval(_tabTimer.iv);_tabTimer.iv=null;var ov=document.getElementById('tab-timer-ov');if(ov)ov.remove();}

// ─── WOD TIMER DISPATCHER ────────────────────────────────────────────────────
function showWodTimer(type,si){
  if(type==='Tabata'){showTabataTimer(si);return;}
  // Countdown types
  if(type==='AMRAP'||type==='Group A'){showAmrapTimer(si);return;}
  // YGIG: RFT if iv.r && iv.cap, else AMRAP
  if(type==='YGIG / Partner WOD'){
    var _iv=S.wod.sections[si].infoVars||{};
    if(_iv.r&&_iv.cap){showRftTimer(si);return;}else{showAmrapTimer(si);return;}
  }
  // Count-up types
  if(type==='For Time / RFT'||type==='Chipper'||type==='Buy-In / Cash-Out'){showRftTimer(si);return;}
  // EMOM
  if(type==='EMOM'){showEmomTimer(si);return;}
  // Countdown from cap
  if(type==='Ladder'||type==='Death By'){showCapTimer(si);return;}
}

// ─── AMRAP / RFT / EMOM TIMER ────────────────────────────────────────────────
var _wodTimer={iv:null,paused:false,elapsed:0,totalSec:0,type:'',curMin:1,totalMin:0,minSec:0,movs:[],finished:false};
function _wodBeep(freq,dur,vol){try{var ctx=new(window.AudioContext||window.webkitAudioContext)();var o=ctx.createOscillator();var g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=freq;g.gain.setValueAtTime(vol||0.4,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);o.start();o.stop(ctx.currentTime+dur);}catch(e){}}
function _wodBeepStart(){_wodBeep(880,0.12);setTimeout(function(){_wodBeep(880,0.12);},130);}
function _wodBeepCountdown(){_wodBeep(660,0.08);}
function _wodBeepDone(){_wodBeep(660,0.15);setTimeout(function(){_wodBeep(880,0.15);},200);setTimeout(function(){_wodBeep(1100,0.4);},400);}
function _fmtMS(sec){var m=Math.floor(sec/60),s=sec%60;return(m<10?'0':'')+m+':'+(s<10?'0':'')+s;}

function showAmrapTimer(si){
  var sec=S.wod.sections[si];
  var totalMin=(S.wod.cfg.time||20);
  var label=(sec.type==='Group A'?'A/B AMRAP':sec.type==='YGIG / Partner WOD'?'YGIG AMRAP':'AMRAP');
  _wodTimer={iv:null,paused:false,elapsed:0,totalSec:totalMin*60,type:'amrap',curMin:0,totalMin:totalMin,minSec:0,movs:[],finished:false,label:label,si:si};
  _wodBeepStart();
  var ov=document.createElement('div');ov.id='wod-timer-ov';ov.style.cssText='position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;font-family:inherit;overflow:hidden;';
  document.body.appendChild(ov);_wodTimerRender();
  _wodTimer.iv=setInterval(function(){
    if(_wodTimer.paused)return;
    _wodTimer.elapsed++;
    var rem=_wodTimer.totalSec-_wodTimer.elapsed;
    if(rem<=0){_wodBeepDone();_wodTimer.finished=true;_wodTimerRender();clearInterval(_wodTimer.iv);_wodTimer.iv=null;return;}
    if(rem<=10)_wodBeepCountdown();
    _wodTimerRender();
  },1000);
}

function showRftTimer(si){
  var sec=S.wod.sections[si];
  var _lbl=sec.type==='Chipper'?'CHIPPER':sec.type==='Buy-In / Cash-Out'?'BUY-IN / CASH-OUT':sec.type==='YGIG / Partner WOD'?'YGIG FOR TIME':'FOR TIME';
  var capSec=(S.wod.cfg.time||20)*60;
  _wodTimer={iv:null,paused:false,elapsed:0,totalSec:capSec,type:'rft',curMin:0,totalMin:0,minSec:0,movs:[],finished:false,label:_lbl,si:si};
  _wodBeepStart();
  var ov=document.createElement('div');ov.id='wod-timer-ov';ov.style.cssText='position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;font-family:inherit;overflow:hidden;';
  document.body.appendChild(ov);_wodTimerRender();
  _wodTimer.iv=setInterval(function(){
    if(_wodTimer.paused)return;
    _wodTimer.elapsed++;
    if(_wodTimer.elapsed>=_wodTimer.totalSec&&!_wodTimer.finished){_rftFinish();return;}
    _wodTimerRender();
  },1000);
}
function _rftFinish(){if(_wodTimer.iv)clearInterval(_wodTimer.iv);_wodTimer.iv=null;_wodTimer.finished=true;_wodBeepDone();_wodTimerRender();}

function showCapTimer(si){
  var sec=S.wod.sections[si];
  var capSec=(S.wod.cfg.time||20)*60;
  var _iv=sec.infoVars||{};
  var _isDB=sec.type==='Death By';
  var _lbl=_isDB?'DEATH BY':'LADDER';
  _wodTimer={iv:null,paused:false,elapsed:0,totalSec:capSec,type:'cap',curMin:0,totalMin:0,minSec:0,movs:[],finished:false,label:_lbl,
    isDB:_isDB,dbStart:_iv.s||1,dbInc:_iv.inc||1,dbLastMin:-1,flash:false,si:si};
  _wodBeepStart();
  var ov=document.createElement('div');ov.id='wod-timer-ov';ov.style.cssText='position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;font-family:inherit;overflow:hidden;';
  document.body.appendChild(ov);_wodTimerRender();
  _wodTimer.iv=setInterval(function(){
    if(_wodTimer.paused)return;
    _wodTimer.elapsed++;
    var rem=_wodTimer.totalSec-_wodTimer.elapsed;
    if(_wodTimer.isDB){
      var _curMin=Math.floor(_wodTimer.elapsed/60)+1;
      if(_curMin!==_wodTimer.dbLastMin){
        _wodTimer.dbLastMin=_curMin;
        if(_wodTimer.elapsed>0){_wodBeepStart();_wodTimer.flash=true;setTimeout(function(){_wodTimer.flash=false;_wodTimerRender();},600);}
      }
    }
    if(rem<=10&&rem>0)_wodBeepCountdown();
    if(rem<=0){_wodBeepDone();_wodTimer.finished=true;_wodTimerRender();clearInterval(_wodTimer.iv);_wodTimer.iv=null;return;}
    _wodTimerRender();
  },1000);
}

function showEmomTimer(si){
  var sec=S.wod.sections[si];
  var totalMin=S.wod.cfg.time||20;
  var movs=sec.items.filter(function(it){return it.kind==='str'||it.kind==='cardio';});
  _wodTimer={iv:null,paused:false,elapsed:0,totalSec:totalMin*60,type:'emom',curMin:1,totalMin:totalMin,minSec:60,movs:movs,finished:false,si:si};
  _wodBeepStart();
  var ov=document.createElement('div');ov.id='wod-timer-ov';ov.style.cssText='position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;font-family:inherit;overflow:hidden;';
  document.body.appendChild(ov);_wodTimerRender();
  _wodTimer.iv=setInterval(function(){
    if(_wodTimer.paused)return;
    _wodTimer.elapsed++;_wodTimer.minSec--;
    if(_wodTimer.minSec<=0){
      _wodTimer.curMin++;
      if(_wodTimer.curMin>_wodTimer.totalMin){_wodBeepDone();_wodTimer.finished=true;_wodTimerRender();clearInterval(_wodTimer.iv);_wodTimer.iv=null;return;}
      _wodTimer.minSec=60;_wodBeepStart();
    }
    if(_wodTimer.minSec<=3&&_wodTimer.minSec>0)_wodBeepCountdown();
    _wodTimerRender();
  },1000);
}

function _wodTimerRender(){
  var ov=document.getElementById('wod-timer-ov');if(!ov)return;
  var wt=_wodTimer,type=wt.type,finished=wt.finished;
  var accent,bg,mainLabel,bigNum,subLabel,progressPct,movName='';
  if(type==='amrap'){
    var rem=Math.max(0,wt.totalSec-wt.elapsed);
    accent=finished?'#22c55e':'#6366f1';bg=finished?'#0a1a0a':'#08080f';
    mainLabel=finished?'TIME\'S UP!':(wt.label||'AMRAP');bigNum=_fmtMS(rem);
    subLabel=wt.totalMin+' MIN';progressPct=wt.totalSec>0?Math.round((rem/wt.totalSec)*100):0;
  }else if(type==='rft'){
    accent=finished?'#22c55e':'#10b981';bg=finished?'#0a1a0a':'#04140a';
    mainLabel=finished?'DONE!':(wt.label||'FOR TIME');bigNum=_fmtMS(wt.elapsed);
    subLabel=finished?'Final: '+_fmtMS(wt.elapsed):'COUNT UP';progressPct=100;
  }else if(type==='cap'){
    var rem=Math.max(0,wt.totalSec-wt.elapsed);
    var _flash=wt.flash&&!finished;
    accent=finished?'#ef4444':(_flash?'#fff':'#f59e0b');
    bg=finished?'#1a0000':(_flash?'#2d1a00':'#110800');
    mainLabel=finished?'TIME CAP!':(wt.label||'CAP');bigNum=_fmtMS(rem);
    if(wt.isDB&&!finished){
      var _dbMin=Math.floor(wt.elapsed/60)+1;
      var _dbReps=wt.dbStart+((_dbMin-1)*wt.dbInc);
      movName='MIN '+_dbMin+' — Do '+_dbReps+' reps';
    }
    subLabel=_fmtMS(wt.totalSec)+' TIME CAP';progressPct=wt.totalSec>0?Math.round((rem/wt.totalSec)*100):0;
  }else{
    var midx=wt.movs.length>0?(wt.curMin-1)%wt.movs.length:-1;
    movName=midx>=0&&wt.movs[midx]?(wt.movs[midx].ex&&wt.movs[midx].ex.name)||'':'';

function _ladderPreview(si){

  var dir=cfg.direction;var start=parseInt(cfg.dynStart);var step=parseInt(cfg.dynStep)||1;

function manualSwapCardio(si,ii){
  var nEl=document.getElementById('cmn-'+si+'-'+ii);
  if(!nEl||!nEl.value.trim())return toast('Enter exercise name','#00bcd4');
  var old=S.wod.sections[si].items[ii];

  // lookup in CARDIO pool
  var found=null;for(var i=0;i<CARDIO.length;i++){if(CARDIO[i].name===name){found=CARDIO[i];break;}}
  var newUnit=found?found.unit:old.ex.unit;
  var newAmount=(found&&found.unit!==old.ex.unit)?found.amount:old.ex.amount;
  var newEx=Object.assign({},old.ex,{name:name,unit:newUnit,amount:newAmount,alts:found?found.alts||[]:[]});
  var newItem=Object.assign({},old,{ex:newEx});
  // reset cardioAmounts if unit changed
  if(found&&found.unit!==old.ex.unit&&old.cardioAmounts){
    newItem.cardioAmounts=old.cardioAmounts.map(function(){return newAmount;});
  }
  S.wod.sections[si].items[ii]=newItem;
  reRenderSec(si);toast('✅ Done!');
}

function openEditDetail(si,ii,r){

  if(!item||item.kind!=='str')return;
  var sec=S.wod.sections[si];
  // Per-round edit mode (long form)
  if(r!==undefined){
    var _rNum=parseInt((getRoundRep(item.detail,r).match(/\d+/)||['10'])[0],10)||10;
    var _rUnit=detUnit(getRoundRep(item.detail,r))||'reps';
    strEditUnit=(_rUnit==='m'||_rUnit==='s')?_rUnit:'reps';
    editingDetail={si:si,ii:ii,roundIdx:r,unit:item.ex.unit||''};
    strEditUnit=(_rUnit==='m'||_rUnit==='s')?_rUnit:'reps';
    _renderEditDetailSheet(item.ex.name+' — Round '+(r+1),_rNum,t('edit_reps'),[10,20,30,40,50,60,80,100],null,false,null);
    var ov=document.getElementById('edit-overlay');

    setTimeout(function(){var inp=document.getElementById('ed-num');if(inp){inp.focus();inp.select();}},80);
    return;
  }
  // Short form multi-round: show all rounds in unified sheet
  // Detect round count from sec.scheme OR from multi-value detail (e.g. "10 - 10 - 10 reps")
  var _detMulti=item.detail.match(/^([\d][\d\s\-]+?)\s*(reps|m|s)\b/);
  var _detParts=_detMulti?_detMulti[1].split('-').map(function(s){return s.trim();}).filter(function(s){return/^\d+$/.test(s);}):[];

    +'<div style="font-size:11px;color:var(--or);text-transform:uppercase;letter-spacing:3px;font-weight:700;margin-bottom:10px">'+t('wod')+'</div>'
    +'<div style="font-size:30px;font-weight:900;color:var(--txt,#fff);letter-spacing:-1px;line-height:1.1;margin-bottom:6px">'+t('title')+'</div>'
    +'<div style="width:40px;height:2px;background:var(--or);margin:12px auto 6px;border-radius:2px"></div>'
    +'<div style="font-size:13px;color:var(--txt2);margin-bottom:32px">'+t('sub')+'</div>'
    +'<div style="width:100%;max-width:340px">'
    +'<div style="font-size:13px;color:var(--txt2);margin-bottom:14px;font-weight:500">'+t('gate_hint')+'</div>'
    +'<input id="gate-email" type="email" placeholder="your@email.com" autocomplete="email"'
    +' style="width:100%;background:var(--bg2);border:1.5px solid var(--bdr);border-radius:12px;padding:16px;font-size:15px;font-weight:600;color:var(--txt);text-align:center;outline:none;margin-bottom:10px"'
    +' onkeydown="if(event.key===\'Enter\')document.getElementById(\'gate-inp\').focus()">'
    +'<input id="gate-inp" type="text" placeholder="WOD-XXXX-XXXX" autocomplete="off" autocapitalize="characters"'
    +' style="width:100%;background:var(--bg2);border:1.5px solid var(--bdr);border-radius:12px;padding:16px;font-size:18px;font-weight:800;color:var(--or);text-align:center;outline:none;letter-spacing:3px;margin-bottom:12px"'
    +' oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key===\'Enter\')tryCode()">'
    +'<button onclick="tryCode()" style="width:100%;background:var(--or);border:none;border-radius:12px;padding:15px;font-size:14px;font-weight:700;color:#000;cursor:pointer;margin-bottom:16px">'+t('enter')+'</button>'
    +'<a href="'+CHECKOUT_URL+'" target="_blank" style="display:block;color:var(--txt2);font-size:15px;text-decoration:none;margin-bottom:10px">'+t('buy')+'</a>'
    +'<button onclick="showTnC()" style="background:none;border:none;color:var(--txt3);font-size:11px;cursor:pointer;text-decoration:underline">'+t('tnc')+'</button>'
    +'</div></div>';
  setTimeout(function(){var i=document.getElementById('gate-email');if(i)i.focus();},100);
}
function tryCode(){
  var emailInp=document.getElementById('gate-email');
  var inp=document.getElementById('gate-inp');
  var email=(emailInp&&emailInp.value.trim().toLowerCase())||'';
  var val=(inp&&inp.value.trim().toUpperCase())||'';
  if(!email||!val)return;
  var btn=document.querySelector('button[onclick="tryCode()"]');
  if(btn){btn.disabled=true;btn.textContent=t('checking');}
  verifyCode(email,val,function(ok){
    if(btn){btn.disabled=false;btn.textContent=t('enter');}
    if(!ok){
      if(inp)inp.style.borderColor='var(--re)';
      if(emailInp)emailInp.style.borderColor='var(--re)';
      toast(t('invalid'),'#ff1744');
      setTimeout(function(){if(inp)inp.style.borderColor='var(--bdr)';if(emailInp)emailInp.style.borderColor='var(--bdr)';},1500);
      return;
    }
    localStorage.setItem(AUTH_KEY,JSON.stringify({email:email,password:val}));
    inp.style.borderColor='var(--gr)';
    app.innerHTML=
      '<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;text-align:center">'
      +'<div style="font-size:48px;margin-bottom:16px">✅</div>'
      +'<div style="font-size:18px;font-weight:700;color:var(--gr);margin-bottom:8px">'+t('granted')+'</div>'
      +'<div style="font-size:13px;color:var(--txt2);margin-bottom:20px;line-height:1.6">'+t('save_pw')+'</div>'
      +'<div style="background:var(--bg2);border:1px solid var(--gr);border-radius:12px;padding:14px 24px;margin-bottom:16px">'
      +'<div style="font-size:11px;color:var(--txt3);margin-bottom:4px">'+t('your_pw')+'</div>'
      +'<div style="font-size:22px;font-weight:900;color:var(--or);letter-spacing:4px">'+val+'</div>'
      +'</div>';
  });
}
loadCfg();
checkAccess();
function setTripletVal(si,key,val,btn){
  sec.tripletCfg[key]=val;btn.style.background='var(--or)';btn.style.borderColor='var(--or)';btn.style.color='#000';
}
</script>
