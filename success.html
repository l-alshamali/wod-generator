<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Your Password — WOD Generator</title>
<style>
  :root { --or:#FF6B00; --bg:#0D0D0D; --bg2:#1A1A1A; --bdr:#2A2A2A; --txt2:#888; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .card { width:100%; max-width:400px; text-align:center; }
  .label { font-size:11px; color:var(--or); text-transform:uppercase; letter-spacing:3px; font-weight:700; margin-bottom:10px; }
  .title { font-size:28px; font-weight:900; letter-spacing:-1px; line-height:1.1; margin-bottom:8px; }
  .divider { width:40px; height:2px; background:var(--or); margin:14px auto; border-radius:2px; }
  .sub { font-size:13px; color:var(--txt2); margin-bottom:28px; }
  input { width:100%; background:var(--bg2); border:1.5px solid var(--bdr); border-radius:12px; padding:16px; font-size:15px; color:#fff; outline:none; margin-bottom:12px; }
  input:focus { border-color:var(--or); }
  button { width:100%; background:var(--or); color:#fff; border:none; border-radius:12px; padding:16px; font-size:15px; font-weight:700; cursor:pointer; }
  button:active { opacity:0.85; }
  .result { margin-top:24px; background:var(--bg2); border:1.5px solid var(--bdr); border-radius:16px; padding:24px; }
  .result-label { font-size:12px; color:var(--txt2); margin-bottom:8px; }
  .code { font-size:26px; font-weight:900; color:var(--or); letter-spacing:4px; margin-bottom:16px; }
  .instructions { font-size:13px; color:var(--txt2); line-height:1.6; }
  .instructions a { color:var(--or); text-decoration:none; font-weight:700; }
  .error { margin-top:16px; color:#ff4444; font-size:13px; }
  .loading { color:var(--txt2); font-size:13px; margin-top:16px; }
  .multi { margin-top:8px; }
  .code-item { background:var(--bg); border:1px solid var(--bdr); border-radius:10px; padding:12px; margin-bottom:8px; font-size:18px; font-weight:800; color:var(--or); letter-spacing:3px; }
</style>
</head>
<body>
<div class="card">
  <div class="label">WOD</div>
  <div class="title">Workout<br>Generator</div>
  <div class="divider"></div>
  <div class="sub">Enter your email to get your password</div>

  <input id="email" type="email" placeholder="your@email.com" autocomplete="email"
    onkeydown="if(event.key==='Enter')getCode()">
  <button onclick="getCode()">Get My Password →</button>

  <div id="output"></div>
</div>

<script>
const SUPABASE_URL = 'https://gjdqkitasyuwqatyitdj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_fEBMY_xuuK-SHDf1Yulxug_Y-sdutRG';

async function getCode() {
  const email = document.getElementById('email').value.trim().toLowerCase();
  const output = document.getElementById('output');

  if (!email || !email.includes('@')) {
    output.innerHTML = '<div class="error">Please enter a valid email.</div>';
    return;
  }

  output.innerHTML = '<div class="loading">Looking up your password...</div>';

  try {
    const res = await fetch(
      SUPABASE_URL + '/rest/v1/access_codes?email=eq.' + encodeURIComponent(email) + '&select=code,created_at&order=created_at.desc',
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
    );
    const data = await res.json();

    if (!data || data.length === 0) {
      output.innerHTML = '<div class="error">No purchase found for this email.<br>Check the email you used on Payhip, or contact @wod.generator on Instagram.</div>';
      return;
    }

    const latest = data[0].code;

    output.innerHTML = `
      <div class="result">
        <div class="result-label">Your Password</div>
        <div class="code">${latest}</div>
        <div class="instructions">
          Go to <a href="https://wodgenerator.org">wodgenerator.org</a><br>
          Enter your email + this password to log in.<br><br>
          <span style="color:#fff">Keep it safe!</span>
        </div>
      </div>`;
  } catch(e) {
    output.innerHTML = '<div class="error">Connection error. Please try again.</div>';
  }
}
</script>
</body>
</html>
